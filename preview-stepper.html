<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Preview — Project Stepper</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{--canvas:#F6F7F5;--surface:#fff;--ink:#171A1E;--muted:#5F6670;--faint:#98A0A8;--line:#E7E9E4;--orange:#EC6A24;--orange-d:#D65E1E;--orange-soft:#FDEEE4;--green:#2C7A31;--red:#C0392B;--r:12px;--sh-1:0 1px 2px rgba(23,26,30,.05),0 2px 8px rgba(23,26,30,.05)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--canvas);font-size:14px;padding:26px}
.wrap{max-width:640px;margin:0 auto}
.note{color:var(--faint);font-size:11px;margin:22px 0 8px;text-transform:uppercase;letter-spacing:.06em;font-weight:700}
.pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);padding:16px 16px 14px;margin-bottom:14px}
.pcard .pc-h{font-size:12px;font-weight:600;color:var(--faint);letter-spacing:.02em;margin-bottom:14px}
.pstepper{display:flex}
.pstepper .step{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center}
.pstepper .step::before,.pstepper .step::after{content:"";position:absolute;top:12px;height:2px;background:var(--line);z-index:0}
.pstepper .step::before{left:0;right:50%}.pstepper .step::after{left:50%;right:0}
.pstepper .step:first-child::before{display:none}.pstepper .step:last-child::after{display:none}
.pstepper .dot{position:relative;z-index:1;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--line);background:var(--surface);color:var(--faint)}
.pstepper .lbl{margin-top:7px;font-size:10.5px;font-weight:600;color:var(--faint);line-height:1.15;max-width:70px}
.step.st-done .dot{background:var(--green);border-color:var(--green);color:#fff}
.step.st-done .lbl{color:var(--muted)}
.step.st-done::before,.step.st-cur::before,.step.st-done::after{background:var(--green)}
.step.st-cur .dot{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 0 0 4px var(--orange-soft)}
.step.st-cur .lbl{color:var(--ink);font-weight:700}
.step.st-stop .dot{background:var(--red);border-color:var(--red);color:#fff}
.step.st-stop::before{background:var(--red)}.step.st-stop .lbl{color:var(--red);font-weight:700}
.ps-note{margin-top:14px;font-size:13px;font-weight:600;color:var(--orange-d);display:flex;align-items:center;gap:7px}
.ps-note.done{color:var(--green)}.ps-note.stop{color:var(--red)}
@media(max-width:560px){.pstepper .lbl{font-size:9px;max-width:52px}.pstepper .dot{width:24px;height:24px;font-size:11px}}
</style></head><body><div class="wrap" id="app"></div>
<script>
const STAGES=['Requested','Inspection','Estimate','Approved','Work Order','Complete'];
function step(idx,note,terminal){
  const done=terminal==='complete';
  const steps=STAGES.map((s,k)=>{let c='st-up';if(done||k<idx)c='st-done';else if(k===idx)c=(terminal==='declined')?'st-stop':'st-cur';const m=(done||k<idx)?'\u2713':(k+1);return `<div class="step ${c}"><span class="dot">${m}</span><span class="lbl">${s}</span></div>`;}).join('');
  const nc=terminal==='declined'?'ps-note stop':(done?'ps-note done':'ps-note');const a=terminal==='declined'?'\u2715':(done?'\u2713':'\u2192');
  return `<div class="pcard"><div class="pc-h">Project status</div><div class="pstepper">${steps}</div><div class="${nc}">${a} ${note}</div></div>`;
}
const cases=[
  ['Just requested',0,'Assessment requested — inspection being scheduled',null],
  ['Inspection scheduled',1,'Inspection scheduled for 2026-07-14',null],
  ['Inspected, pricing findings',2,'Findings under review — estimate being prepared',null],
  ['Estimate sent (client action)',3,'Estimate sent — awaiting your approval',null],
  ['Approved, scheduling work',4,'Estimate approved — scheduling work',null],
  ['Work in progress',4,'Work in progress',null],
  ['Complete & paid',5,'Completed and paid','complete'],
  ['Estimate declined (terminal)',3,'Estimate declined','declined']
];
document.getElementById('app').innerHTML=cases.map(c=>`<div class="note">${c[0]}</div>`+step(c[1],c[2],c[3])).join('');
</script></body></html>
