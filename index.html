<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="light"/>
<title>FourTres Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
  :root{
    --canvas:#F6F7F5;--surface:#fff;--ink:#171A1E;--muted:#5F6670;--faint:#98A0A8;
    --line:#E7E9E4;--line2:#F0F1EE;
    --navy:#101418;--navy2:#1A2028;--navyline:rgba(255,255,255,.08);
    --orange:#EC6A24;--orange-d:#D65E1E;--orange-soft:#FDEEE4;
    --blue:#1E6FB8;--blue-soft:#E8F1FA;--green:#2C7A31;--green-soft:#E6F4E8;
    --amber:#C75E00;--amber-soft:#FBEFDD;--red:#C0392B;--red-soft:#FBE9E7;--gray-soft:#EEF0F1;--gray-t:#566169;
    --sh-1:0 1px 2px rgba(23,26,30,.05),0 2px 8px rgba(23,26,30,.05);
    --sh-2:0 2px 4px rgba(23,26,30,.06),0 10px 24px rgba(23,26,30,.09);
    --sh-3:0 24px 64px rgba(10,12,14,.32);
    --r:12px;--rc:8px;
    color-scheme:light}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--canvas);-webkit-font-smoothing:antialiased;font-size:14px}
  h1,h2,h3,.ph,.stat .n{font-family:Montserrat,Inter,sans-serif}
  button{font-family:inherit}
  .hidden{display:none!important}
  :focus-visible{outline:2px solid var(--orange);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  .spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;vertical-align:-2px}
  @keyframes s{to{transform:rotate(360deg)}}

  /* ---------- login ---------- */
  #login-view{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1100px 520px at 50% -12%,#1C232C,#101418 62%)}
  .card-login{width:100%;max-width:402px;background:#fff;border-radius:18px;padding:40px 34px;box-shadow:var(--sh-3)}
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:28px}
  .brand img{height:56px;margin-bottom:14px}
  .brand h1{font-weight:800;font-size:21px;letter-spacing:-.01em}
  .brand p{color:var(--muted);font-size:13.5px;margin-top:5px}
  label{display:block;font-size:12.5px;font-weight:600;margin:0 0 6px;color:#2A2F35}
  .field{width:100%;border:1px solid var(--line);border-radius:var(--rc);padding:11px 13px;font-size:14.5px;font-family:Inter,sans-serif;background:#fff;transition:border-color .15s,box-shadow .15s;margin-bottom:15px;color:var(--ink)}
  .field:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(236,106,36,.14)}
  .btn{border:0;border-radius:var(--rc);font-weight:600;font-size:13.5px;cursor:pointer;transition:transform .12s,filter .15s,background .15s,box-shadow .15s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--orange);color:#fff;padding:11px 18px;box-shadow:0 1px 2px rgba(214,94,30,.35),0 4px 14px rgba(236,106,36,.26)}
  .btn-primary:hover{background:var(--orange-d)}
  .btn-block{width:100%;padding:12px 16px}
  .btn-ghost{background:#fff;border:1px solid var(--line);color:var(--ink);padding:9px 14px}
  .btn-ghost:hover{background:var(--canvas);border-color:#D8DBD5}
  .btn-sm{padding:6px 11px;font-size:12.5px;border-radius:7px}
  .btn-danger{background:var(--red-soft);color:var(--red);padding:9px 14px}
  .msg{font-size:13.5px;margin-bottom:14px;padding:10px 12px;border-radius:8px;display:none}
  .msg.err{display:block;background:var(--red-soft);color:#B3261E}
  .foot{text-align:center;font-size:10.5px;color:var(--faint);margin-top:24px;letter-spacing:.14em;text-transform:uppercase;font-weight:600}

  /* ---------- app shell ---------- */
  .shell{display:flex;min-height:100vh}
  .side{width:232px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .side .slogo{display:flex;align-items:center;gap:11px;padding:20px 20px 18px;border-bottom:1px solid var(--navyline)}
  .side .slogo img{height:32px}
  .side .slogo .n{font-family:Montserrat;font-weight:800;font-size:14.5px;color:#fff;letter-spacing:.02em}
  .side .slogo .n em{color:var(--orange);font-style:normal}
  .nav{display:flex;flex-direction:column;gap:2px;padding:14px 12px;flex:1}
  .nav button{position:relative;display:flex;align-items:center;gap:12px;border:0;background:none;text-align:left;font-size:13.5px;font-weight:500;color:#AEB6BF;padding:10px 12px 10px 16px;border-radius:9px;cursor:pointer;transition:background .14s,color .14s}
  .nav button:hover{background:var(--navy2);color:#E8ECF0}
  .nav button.on{background:var(--navy2);color:#fff;font-weight:600}
  .nav button.on::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:4px;height:22px;background:var(--orange);
    clip-path:polygon(0 0,100% 0,100% 18%,55% 18%,55% 40%,100% 40%,100% 60%,55% 60%,55% 82%,100% 82%,100% 100%,0 100%)}
  .nav svg{opacity:.9;flex:none}
  .side .sfoot{padding:14px 20px;border-top:1px solid var(--navyline);font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:#5C646E;font-weight:600}

  .maincol{flex:1;min-width:0;display:flex;flex-direction:column}
  .hdr{height:58px;background:var(--surface);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;padding:0 22px;position:sticky;top:0;z-index:30}
  .crumb{font-size:12px;color:var(--faint);font-weight:600;letter-spacing:.02em;white-space:nowrap}
  .crumb b{color:var(--ink);font-weight:700}
  .hsearch{flex:1;max-width:420px;position:relative}
  .hsearch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--faint)}
  .hsearch input{width:100%;border:1px solid var(--line);background:var(--canvas);border-radius:9px;padding:8px 12px 8px 34px;font-size:13.5px;font-family:Inter,sans-serif;transition:border-color .15s,background .15s}
  .hsearch input:focus{outline:none;border-color:var(--orange);background:#fff;box-shadow:0 0 0 3px rgba(236,106,36,.12)}
  .hspacer{flex:1}
  .avatar{display:inline-flex;align-items:center;justify-content:center;border-radius:50%;color:#fff;font-family:Montserrat;font-weight:700;flex-shrink:0}
  .pbtn{border:0;background:none;cursor:pointer;border-radius:50%;padding:2px;transition:box-shadow .15s}
  .pbtn:hover{box-shadow:0 0 0 3px var(--line2)}
  .pmenu{position:absolute;right:18px;top:54px;width:236px;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--sh-2);padding:8px;z-index:60;display:none}
  .pmenu.show{display:block;animation:fade .16s ease}
  .pmenu .who{padding:10px 12px;border-bottom:1px solid var(--line2);margin-bottom:6px}
  .pmenu .who .nm{font-weight:700;font-size:13.5px}
  .pmenu .who .em{font-size:12px;color:var(--muted);margin-top:2px;word-break:break-all}
  .pmenu button{width:100%;text-align:left;border:0;background:none;padding:9px 12px;border-radius:8px;font-size:13.5px;cursor:pointer;color:var(--ink)}
  .pmenu button:hover{background:var(--canvas)}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:999px;background:var(--gray-soft);color:var(--gray-t)}
  .badge.staff{background:var(--orange-soft);color:#B4531C}

  .main{flex:1;padding:26px 26px 96px;max-width:1120px;width:100%;margin:0 auto}
  .view{animation:fade .22s ease}
  @keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .rowtop{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:22px}
  .ph{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .psub{color:var(--muted);font-size:13.5px;margin-top:5px}
  .sec-h{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--faint);margin:26px 0 12px}

  /* stats */
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:6px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 17px;box-shadow:var(--sh-1);cursor:pointer;transition:box-shadow .18s,transform .18s;position:relative;overflow:hidden}
  .stat:hover{box-shadow:var(--sh-2);transform:translateY(-1px)}
  .stat .n{font-weight:800;font-size:26px;letter-spacing:-.02em;line-height:1}
  .stat .k{font-size:12px;color:var(--muted);margin-top:8px;font-weight:500}
  .stat.warn .n{color:var(--red)}
  .stat[data-static]{cursor:default}.stat[data-static]:hover{box-shadow:var(--sh-1);transform:none}

  /* needs-attention list (client home) */
  .attn{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);margin-bottom:18px;overflow:hidden}
  .attn-h{font-size:12px;font-weight:600;color:var(--faint);letter-spacing:.02em;padding:14px 16px 10px}
  .attn-row{display:flex;align-items:center;gap:14px;padding:12px 16px;cursor:pointer;transition:background .12s}
  .attn-row+.attn-row{border-top:1px solid var(--line2)}
  .attn-row:hover{background:var(--canvas)}
  .attn-main{min-width:0;flex:1}
  .attn-title{font-weight:600;font-size:14px;line-height:1.3;display:flex;align-items:center;gap:8px}
  .attn-dot{width:7px;height:7px;border-radius:50%;flex:none}
  .attn-sub{color:var(--muted);font-size:12.5px;margin-top:3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .attn-sub b{color:var(--ink);font-weight:600}
  .attn-go{flex:none;color:var(--orange);font-weight:600;font-size:12.5px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .attn-go svg{width:14px;height:14px}
  @media(max-width:560px){.attn-row{gap:10px}.attn-go .lbl2{display:none}}

  /* project stage stepper */
  .pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);padding:16px 16px 14px;margin-bottom:14px}
  .pcard .pc-h{font-size:12px;font-weight:600;color:var(--faint);letter-spacing:.02em;margin-bottom:14px}
  .pstepper{display:flex}
  .pstepper .step{flex:1;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center}
  .pstepper .step::before,.pstepper .step::after{content:"";position:absolute;top:12px;height:2px;background:var(--line);z-index:0}
  .pstepper .step::before{left:0;right:50%}
  .pstepper .step::after{left:50%;right:0}
  .pstepper .step:first-child::before{display:none}
  .pstepper .step:last-child::after{display:none}
  .pstepper .dot{position:relative;z-index:1;width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;border:2px solid var(--line);background:var(--surface);color:var(--faint)}
  .pstepper .lbl{margin-top:7px;font-size:10.5px;font-weight:600;color:var(--faint);line-height:1.15;max-width:70px}
  .step.st-done .dot{background:var(--green);border-color:var(--green);color:#fff}
  .step.st-done .lbl{color:var(--muted)}
  .step.st-done::before,.step.st-cur::before,.step.st-done::after{background:var(--green)}
  .step.st-cur .dot{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 0 0 4px var(--orange-soft)}
  .step.st-cur .lbl{color:var(--ink);font-weight:700}
  .step.st-stop .dot{background:var(--red);border-color:var(--red);color:#fff}
  .step.st-stop::before{background:var(--red)}
  .step.st-stop .lbl{color:var(--red);font-weight:700}
  .ps-note{margin-top:14px;font-size:13px;font-weight:600;color:var(--orange-d);display:flex;align-items:center;gap:7px}
  .ps-note.done{color:var(--green)}
  .ps-note.stop{color:var(--red)}
  @media(max-width:560px){.pstepper .lbl{font-size:9px;max-width:52px}.pstepper .dot{width:24px;height:24px;font-size:11px}}

  /* work orders (kanban) */
  .kanban{display:flex;gap:12px;align-items:flex-start;margin-top:4px}
  .kcol{flex:1;min-width:0;background:var(--canvas);border:1px solid var(--line);border-radius:var(--r);padding:11px 11px 4px}
  .kcol-h{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:.02em;padding:2px 3px 11px;display:flex;align-items:center;gap:7px}
  .kcol-h .kn{background:var(--gray-soft);color:var(--gray-t);font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;padding:0 5px}
  .kitem{background:var(--surface);border:1px solid var(--line);border-radius:var(--rc);padding:11px 12px;margin-bottom:8px;box-shadow:var(--sh-1)}
  .kitem b{font-size:14px;font-weight:700}
  @media(max-width:860px){.kanban{flex-direction:column}.kcol{width:100%;flex:none}}

  /* cards & grids */
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(258px,1fr))}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;box-shadow:var(--sh-1);transition:box-shadow .18s}
  .card:hover{box-shadow:var(--sh-2)}
  .card h3{font-size:14.5px;font-weight:700;margin-bottom:5px}
  .card .meta{color:var(--muted);font-size:12.5px;line-height:1.55}
  .card .cardfoot{margin-top:12px;display:flex;gap:8px;flex-wrap:wrap}
  .empty{background:var(--surface);border:1px dashed #D5D8D2;border-radius:var(--r);padding:36px;text-align:center;color:var(--muted);font-size:13.5px}

  /* property cards */
  .pcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh-1);transition:box-shadow .18s,transform .18s;display:flex;flex-direction:column}
  .pcard:hover{box-shadow:var(--sh-2);transform:translateY(-2px)}
  .pcover{height:132px;background-size:cover;background-position:center;position:relative;background-color:#1A2028}
  .pcover .ppill{position:absolute;top:10px;left:10px}
  .pbody{padding:14px 16px 15px;display:flex;flex-direction:column;flex:1}
  .pbody h3{font-size:14.5px;font-weight:700}
  .pbody .addr{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.5}
  .pdates{margin-top:10px;display:flex;flex-direction:column;gap:3px;font-size:12px;color:var(--muted)}
  .pdates b{color:var(--ink);font-weight:600}
  .pfoot{margin-top:12px;padding-top:11px;border-top:1px solid var(--line2);display:flex;gap:8px}
  .pill{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;line-height:1.2}
  .p-blue{background:var(--blue-soft);color:var(--blue)}.p-green{background:var(--green-soft);color:var(--green)}
  .p-amber{background:var(--amber-soft);color:var(--amber)}.p-red{background:var(--red-soft);color:var(--red)}
  .p-gray{background:var(--gray-soft);color:var(--gray-t)}

  /* org header */
  .org-head{display:flex;align-items:center;gap:12px;margin:26px 0 13px;flex-wrap:wrap}
  .org-head .org-name{font-family:Montserrat;font-weight:700;font-size:15.5px}
  .org-head .head-actions{margin-left:auto;display:flex;gap:8px;flex-shrink:0}
  .sub2{font-size:12px;color:var(--muted)}

  /* ---------- table system ---------- */
  .tblcard{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1)}
  table{width:100%;border-collapse:separate;border-spacing:0}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--faint);font-weight:700;padding:11px 15px;background:#FBFBFA;border-bottom:1px solid var(--line);position:sticky;top:58px;z-index:2}
  th:first-child{border-top-left-radius:var(--r)}th:last-child{border-top-right-radius:var(--r)}
  th[data-sort]{cursor:pointer;user-select:none;transition:color .14s}
  th[data-sort]:hover{color:var(--ink)}
  th .sarr{font-size:9px;margin-left:4px;color:var(--orange)}
  td{padding:12px 15px;font-size:13.5px;border-bottom:1px solid var(--line2);vertical-align:middle}
  tbody tr:last-child td{border-bottom:0}
  tbody tr:nth-child(even){background:#FCFCFB}
  tbody tr:hover{background:#F7F8F6}
  td .pname{font-weight:600}.right{text-align:right}
  .tfoot{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 15px;border-top:1px solid var(--line);font-size:12.5px;color:var(--muted)}
  .tfoot .pgbtns{display:flex;gap:6px}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:13px}
  .chip{border:1px solid var(--line);background:var(--surface);border-radius:999px;padding:6px 13px;font-size:12.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:all .14s}
  .chip:hover{border-color:#D3D6D0;color:var(--ink)}
  .chip.on{background:var(--navy);border-color:var(--navy);color:#fff}

  /* ---------- property detail ---------- */
  .dhead{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);overflow:hidden;margin-bottom:16px}
  .dcover{height:172px;background-size:cover;background-position:center;background-color:#1A2028;position:relative}
  .dcover .ppill{position:absolute;top:12px;left:12px}
  .dbar{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:16px 20px}
  .dbar h2{font-size:20px;font-weight:800;letter-spacing:-.02em}
  .dbar .dsub{color:var(--muted);font-size:13px;margin-top:4px}
  .dtabs{display:flex;gap:2px;padding:0 12px;border-top:1px solid var(--line2);overflow-x:auto}
  .dtabs::-webkit-scrollbar{display:none}
  .dtabs button{flex:0 0 auto;border:0;background:none;font-size:13px;font-weight:600;color:var(--muted);padding:12px 14px;border-bottom:2.5px solid transparent;cursor:pointer;transition:color .14s;white-space:nowrap}
  .dtabs button:hover{color:var(--ink)}
  .dtabs button.on{color:var(--ink);border-bottom-color:var(--orange)}
  .info2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:760px){.info2{grid-template-columns:1fr}}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--line2);font-size:13px}
  .kv:last-child{border-bottom:0}
  .kv .k{color:var(--muted)}.kv .v{font-weight:600;text-align:right}
  .doc{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line2)}
  .doc:last-child{border-bottom:0}
  .doc .dic{width:34px;height:34px;border-radius:8px;background:var(--orange-soft);color:var(--orange);display:flex;align-items:center;justify-content:center;flex:none}
  .doc .dn{font-weight:600;font-size:13.5px}.doc .dm{font-size:11.5px;color:var(--faint)}
  .doc .dact{margin-left:auto;display:flex;gap:7px}

  /* ---------- schedule ---------- */
  .seg-toggle{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff}
  .seg-toggle button{border:0;background:#fff;padding:8px 15px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:background .14s,color .14s}
  .seg-toggle button.on{background:var(--navy);color:#fff}
  .cal-head{display:flex;align-items:center;gap:12px;margin-bottom:14px}
  .cal-head .mo{font-family:Montserrat,Inter,sans-serif;font-weight:800;font-size:18px;min-width:170px}
  .cal-nav{display:flex;gap:6px}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .legend i{width:9px;height:9px;border-radius:3px;display:inline-block}
  .lg-insp{background:var(--blue)}.lg-job{background:var(--orange)}.lg-est{background:var(--amber)}
  .cal{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);overflow:hidden}
  .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);background:#FBFBFA;border-bottom:1px solid var(--line)}
  .cal-dow div{padding:9px 6px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);text-align:center}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr)}
  .cal-cell{min-height:96px;border-right:1px solid var(--line2);border-bottom:1px solid var(--line2);padding:6px 6px 4px;cursor:pointer;transition:background .12s;position:relative;overflow:hidden}
  .cal-cell:nth-child(7n){border-right:0}
  .cal-cell:hover{background:#FAFBF9}
  .cal-cell.other{background:#FCFCFB;color:var(--faint)}
  .cal-cell.today .dn{background:var(--orange);color:#fff}
  .cal-cell .dn{display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px;border-radius:50%;font-size:12px;font-weight:600;margin-bottom:3px}
  .ev{font-size:10.5px;font-weight:600;padding:2px 6px;border-radius:5px;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.35}
  .ev.insp{background:var(--blue-soft);color:var(--blue)}.ev.job{background:var(--orange-soft);color:#B4531C}.ev.est{background:var(--amber-soft);color:var(--amber)}
  .ev-more{font-size:10px;color:var(--faint);font-weight:600}
  .agenda-day{margin-bottom:18px}
  .agenda-date{font-family:Montserrat,Inter,sans-serif;font-weight:700;font-size:13.5px;margin-bottom:9px;display:flex;align-items:center;gap:9px}
  .agenda-date .pill{font-size:10px}
  .arow{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--ac,var(--line));border-radius:10px;box-shadow:var(--sh-1);padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:box-shadow .15s}
  .arow:hover{box-shadow:var(--sh-2)}
  .arow .atype{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;padding:3px 8px;border-radius:999px;flex:none}
  .arow .atitle{font-weight:600;font-size:13.5px}
  .arow .ameta{font-size:12px;color:var(--muted);margin-top:1px}
  .arow .aright{margin-left:auto;text-align:right;flex:none}
  @media(max-width:860px){
    .cal-cell{min-height:62px;padding:4px 3px}
    .cal-cell .dn{min-width:18px;height:18px;font-size:11px}
    .ev{font-size:0;padding:0;height:6px;border-radius:3px;margin-bottom:2px}
    .ev-more{display:none}
    .cal-head .mo{min-width:0;font-size:16px;flex:1}
  }

  /* activity feed */
  .feed{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh-1);padding:6px 0}
  .fitem{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--line2)}
  .fitem:last-child{border-bottom:0}
  .fdot{width:8px;height:8px;border-radius:3px;flex:none}
  .fitem .ft{font-size:13px}.fitem .fd{margin-left:auto;font-size:11.5px;color:var(--faint);white-space:nowrap}

  .dash2{display:grid;grid-template-columns:1.6fr 1fr;gap:16px;align-items:start}
  @media(max-width:900px){.dash2{grid-template-columns:1fr}}

  /* modal */
  .scrim{display:none;position:fixed;inset:0;background:rgba(12,14,16,.5);z-index:70;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
  .scrim.show{display:flex}
  .modal{background:#fff;border-radius:16px;width:100%;max-width:472px;padding:24px;box-shadow:var(--sh-3);max-height:92vh;overflow:auto;animation:pop .18s ease}
  @keyframes pop{from{opacity:0;transform:scale(.985) translateY(6px)}to{opacity:1;transform:none}}
  .modal h3{font-size:18px;font-weight:800;margin-bottom:18px;letter-spacing:-.01em}
  .modal .mrow{display:flex;gap:10px;justify-content:flex-end;margin-top:10px}
  /* photo dropzone */
  .dz{border:1.5px dashed #CBD0C9;border-radius:12px;background:var(--canvas);margin-bottom:16px;overflow:hidden;cursor:pointer;transition:border-color .15s,background .15s;position:relative}
  .dz:hover,.dz.over{border-color:var(--orange);background:var(--orange-soft)}
  .dz .dz-empty{padding:22px;text-align:center;color:var(--muted);font-size:12.5px}
  .dz .dz-empty b{color:var(--ink)}
  .dz img{width:100%;height:150px;object-fit:cover;display:block}
  .dz-actions{display:flex;gap:8px;margin:-6px 0 16px}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--navy);color:#fff;padding:12px 18px;border-radius:11px;font-size:13.5px;opacity:0;transition:.25s;pointer-events:none;z-index:90;box-shadow:var(--sh-2)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  /* mobile */
  .tabbar{display:none}
  @media(max-width:860px){
    .side{display:none}
    .main{padding:18px 14px 116px}
    .hdr{padding:0 12px;gap:10px;background:var(--navy);border-bottom:1px solid var(--navyline)}
    .hsearch input{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.16);color:#fff}
    .hsearch input::placeholder{color:rgba(255,255,255,.55)}
    .hsearch svg{color:rgba(255,255,255,.55)}
    .hsearch input:focus{background:rgba(255,255,255,.15);border-color:var(--orange);box-shadow:0 0 0 3px rgba(236,106,36,.22)}
    .crumb{display:none}
    .hsearch{max-width:none}
    .ph{font-size:21px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .rowtop{margin-bottom:16px}
    .rowtop>div[style]{width:100%;display:flex;gap:8px}
    .rowtop .btn{flex:1}
    .chips{flex-wrap:nowrap;overflow-x:auto;padding-bottom:3px;-webkit-overflow-scrolling:touch}
    .chips::-webkit-scrollbar{display:none}
    .chip{flex:0 0 auto}
    table,thead,tbody,th,td,tr{display:block}thead{display:none}
    td{border-bottom:0;padding:3px 15px}tr{border-bottom:1px solid var(--line2);padding:9px 0}
    tbody tr:nth-child(even){background:transparent}
    tbody tr:last-child{border-bottom:0}td.right{text-align:left}
    .tfoot{flex-wrap:wrap;justify-content:center;gap:8px}
    .dcover{height:118px}
    .dbar{padding:13px 14px}
    .dbar h2{font-size:17px}
    .dbar>div[style]{width:100%}
    .dbar .btn{flex:1}
    .pfoot .btn{flex:1}
    /* bottom-sheet modals */
    .scrim{padding:0;align-items:flex-end}
    .modal{max-width:none;border-radius:18px 18px 0 0;max-height:88vh;padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:sheet .22s ease}
    .modal .mrow .btn{flex:1}
    .tabbar{display:flex;position:fixed;bottom:0;left:0;right:0;background:var(--navy);border-top:1px solid var(--navyline);z-index:40;padding:10px 4px calc(16px + env(safe-area-inset-bottom));box-shadow:0 -6px 22px rgba(0,0,0,.20)}
    .tabbar button{flex:1;border:0;background:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;color:rgba(255,255,255,.62);font-size:10px;font-weight:600;cursor:pointer}
    .tabbar button.on{color:var(--orange)}
    .more-sheet{position:fixed;left:10px;right:10px;bottom:calc(82px + env(safe-area-inset-bottom));background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--sh-2);padding:8px;z-index:55;display:none;grid-template-columns:repeat(2,1fr);gap:4px}
    .more-sheet.show{display:grid;animation:sheet .18s ease}
    .more-sheet button{border:0;background:#fff;border-radius:11px;padding:12px 10px;display:flex;align-items:center;gap:10px;color:var(--ink);font-size:13px;font-weight:600;text-align:left;cursor:pointer}
    .more-sheet button:hover,.more-sheet button.on{background:var(--canvas);color:var(--orange)}
    .more-sheet button svg{flex:none}
  }
  @keyframes sheet{from{transform:translateY(28px);opacity:.65}to{transform:none;opacity:1}}
</style>
</head>

const AVPAL=['#1E88E5','#2E7D32','#0097A7','#6A1B9A','#C2185B','#00897B','#5E5CE6'];
function avatar(name,size){let h=0;for(const ch of (name||'?'))h=ch.charCodeAt(0)+((h<<5)-h);const col=AVPAL[Math.abs(h)%AVPAL.length];const init=(name||'?').split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();return `<span class="avatar" style="background:${col};width:${size}px;height:${size}px;font-size:${Math.round(size*.4)}px">${init}</span>`;}

function showLogin(){$('app-view').classList.add('hidden');$('login-view').classList.remove('hidden');}
function showApp(){$('login-view').classList.add('hidden');$('app-view').classList.remove('hidden');}

/* ---------- auth ---------- */
$('login-form').addEventListener('submit',async e=>{
  e.preventDefault();const b=$('login-btn'),msg=$('login-msg');msg.className='msg';b.disabled=true;b.innerHTML='<span class="spin"></span>';
  const {error}=await sb.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});
  b.disabled=false;b.textContent='Sign in';
  if(error){msg.className='msg err';msg.textContent=error.message||'Could not sign in.';return;}
  await loadApp();
});
$('logout').addEventListener('click',async()=>{$('pmenu').classList.remove('show');await sb.auth.signOut();showLogin();});

async function loadApp(){
  const {data:{user}}=await sb.auth.getUser(); if(!user)return showLogin();
  state.userId=user.id; state.email=user.email||'';
  const {data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
  state.profile=profile||{};state.role=profile?.role||'client';
  const nm=state.profile.full_name||state.email;
  $('profile-btn').innerHTML=avatar(nm,32);
  $('pm-name').textContent=state.profile.full_name||'—';
  $('pm-email').textContent=state.email;
  const bd=$('pm-badge');bd.textContent=state.role;bd.className='badge'+(state.role==='staff'?' staff':'');
  await loadData(); view='home'; state.q=''; $('gsearch').value=''; render(); showApp();
}
async function loadData(){
  const [orgs,props,insp,reqs,staff,fc,est,jobs]=await Promise.all([
    sb.from('organizations').select('*').order('name'),
    sb.from('properties').select('*').order('name'),
    sb.from('inspections').select('id,status,inspection_date,scheduled_date,assigned_to,property_name,property_id,org_id,created_at,updated_at').order('created_at',{ascending:false}),
    sb.from('assessment_requests').select('*, organizations(name)').order('created_at',{ascending:false}),
    sb.from('profiles').select('id,full_name,email,phone,title,role').in('role',['staff','tech']),
    sb.from('inspection_findings').select('id',{count:'exact',head:true}),
    sb.from('estimates').select('*, organizations(name)').order('created_at',{ascending:false}),
    sb.from('jobs').select('*, organizations(name)').order('scheduled_date',{ascending:true})
  ]);
  state.orgs=orgs.data||[];state.properties=props.data||[];state.inspections=insp.data||[];state.requests=reqs.data||[];state.staff=staff.data||[];
  state.findingsCount=fc.count||0;
  state.estimates=est.data||[];
  state.jobs=jobs.data||[];
  state.notificationPrefs=null;
  try{
    const {data:prefs}=await sb.from('notification_preferences').select('*').eq('user_id',state.userId).maybeSingle();
    state.notificationPrefs=prefs||null;
  }catch(e){ console.warn('notification_preferences not available yet',e); }
  applyRoleScope();
  state.clientFindings=[];
  if(state.role==='client'){
    try{const {data:cf}=await sb.from('inspection_findings').select('id,inspection_id,category,location,severity,status').order('created_at',{ascending:false});const allowed=new Set(state.inspections.map(i=>i.id));state.clientFindings=(cf||[]).filter(f=>allowed.has(f.inspection_id));}
    catch(e){state.clientFindings=[];}
  }
}
function inspPropName(i){const p=state.properties.find(x=>x.id===i.property_id);return (p&&p.name)||i.property_name||'Untitled';}
function inspClientName(i){const p=state.properties.find(x=>x.id===i.property_id);const oid=(p&&p.org_id)||i.org_id;const o=state.orgs.find(x=>x.id===oid);return o?o.name:'';}
function recordOrgId(x){
  if(!x)return null;
  if(x.org_id)return x.org_id;
  if(x.property_id){const p=state.properties.find(p=>p.id===x.property_id);return p&&p.org_id;}
  return null;
}
function applyRoleScope(){
  if(state.role!=='client')return;
  const oid=state.profile&&state.profile.org_id;
  if(!oid)return;
  state.orgs=state.orgs.filter(o=>o.id===oid);
  state.properties=state.properties.filter(p=>p.org_id===oid);
  state.inspections=state.inspections.filter(i=>recordOrgId(i)===oid);
  state.requests=state.requests.filter(r=>recordOrgId(r)===oid);
  state.estimates=state.estimates.filter(e=>recordOrgId(e)===oid);
  state.jobs=state.jobs.filter(j=>recordOrgId(j)===oid);
}

function matches(q,...vals){if(!q)return true;q=q.toLowerCase();return vals.some(v=>String(v||'').toLowerCase().includes(q));}

/* ---------- table engine: sort · filter chips · pagination · sticky headers ---------- */
const PAGE_SIZE=8;
function tstate(id){if(!state.tbl[id])state.tbl[id]={sort:null,dir:1,page:1,filter:'all'};return state.tbl[id];}
function dataTable(id,cfg){
  const t=tstate(id);
  let rows=cfg.rows;
  if(cfg.filters&&t.filter!=='all')rows=rows.filter(r=>cfg.filterFn(r,t.filter));
  if(t.sort){const col=cfg.columns.find(c=>c.key===t.sort);if(col){const sv=col.sortVal||(r=>r[col.key]);rows=[...rows].sort((a,b)=>{const x=sv(a),y=sv(b);return String(x==null?'':x).localeCompare(String(y==null?'':y),undefined,{numeric:true})*t.dir;});}}
  const total=rows.length,pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  if(t.page>pages)t.page=pages;
  const start=(t.page-1)*PAGE_SIZE, slice=rows.slice(start,start+PAGE_SIZE);
  const chips=cfg.filters?`<div class="chips">${cfg.filters.map(f=>`<button class="chip ${t.filter===f.value?'on':''}" data-tfilter="${f.value}" data-tid="${id}">${f.label}</button>`).join('')}</div>`:'';
  const head=cfg.columns.map(c=>c.sortable
    ?`<th data-sort="${c.key}" data-tid="${id}">${c.label}${t.sort===c.key?`<span class="sarr">${t.dir>0?'▲':'▼'}</span>`:''}</th>`
    :`<th>${c.label}</th>`).join('');
  const body=slice.length
    ?slice.map(r=>`<tr>${cfg.columns.map(c=>`<td class="${c.cls||''}">${c.render(r)}</td>`).join('')}</tr>`).join('')
    :`<tr><td colspan="${cfg.columns.length}" style="text-align:center;color:var(--muted);padding:26px">${cfg.emptyText||'Nothing here.'}</td></tr>`;
  const foot=total>PAGE_SIZE?`<div class="tfoot"><span>${start+1}–${Math.min(start+PAGE_SIZE,total)} of ${total}</span>
    <div class="pgbtns"><button class="btn btn-ghost btn-sm" data-tpage="prev" data-tid="${id}" ${t.page<=1?'disabled':''}>‹ Prev</button><button class="btn btn-ghost btn-sm" data-tpage="next" data-tid="${id}" ${t.page>=pages?'disabled':''}>Next ›</button></div></div>`:'';
  return `${chips}<div class="tblcard"><table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>${foot}</div>`;
}

/* ---------- dashboard ---------- */
function relDate(d){if(!d)return'';const dt=new Date(d);const days=Math.round((Date.now()-dt.getTime())/86400000);if(days<=0)return'today';if(days===1)return'yesterday';if(days<30)return days+'d ago';return dt.toLocaleDateString();}
function activityFeed(){
  const items=[];
  for(const i of state.inspections.slice(0,12)){
    if(i.status==='complete')items.push({c:'var(--green)',t:`Inspection completed — ${inspPropName(i)}`,d:i.updated_at||i.created_at});
    else if(i.status==='scheduled')items.push({c:'var(--blue)',t:`Inspection scheduled — ${inspPropName(i)}`,d:i.created_at});
    else items.push({c:'var(--amber)',t:`Inspection in progress — ${inspPropName(i)}`,d:i.created_at});
  }
  for(const r of state.requests.slice(0,8))items.push({c:'var(--orange)',t:`Assessment requested — ${r.property_name||'Untitled'}`,d:r.created_at});
  items.sort((a,b)=>String(b.d||'').localeCompare(String(a.d||'')));
  const top=items.slice(0,6);
  if(!top.length)return '<div class="empty">No activity yet. Create an inspection or request to begin.</div>';
  return `<div class="feed">${top.map(x=>`<div class="fitem"><span class="fdot" style="background:${x.c}"></span><span class="ft">${esc(x.t)}</span><span class="fd">${relDate(x.d)}</span></div>`).join('')}</div>`;
}
function clientActionBand(){
  const decid=state.estimates.filter(e=>e.status==='sent'||e.status==='revision_requested');
  const openF=(state.clientFindings||[]).filter(f=>f.status!=='resolved');
  if(!decid.length&&!openF.length)return '';
  const arrow='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>';
  const amt=n=>n==null||n===''?'':'$'+Number(n).toLocaleString('en-US',{maximumFractionDigits:0});
  const rows=[];
  for(const e of decid){
    const rev=e.status==='revision_requested';
    const bits=[rev?'Revised estimate':'Estimate',estPropName(e)?esc(estPropName(e)):'',amt(e.total)?`<b>${amt(e.total)}</b>`:''].filter(Boolean);
    rows.push(`<div class="attn-row" data-open-est="${e.id}">
      <div class="attn-main"><div class="attn-title">${esc(e.title||'Estimate')}</div>
        <div class="attn-sub">${bits.join(' · ')}</div></div>
      <span class="attn-go">Review<span class="lbl2">&nbsp;&amp; respond</span> ${arrow}</span></div>`);
  }
  if(openF.length){
    const byProp={};
    for(const f of openF){const insp=state.inspections.find(i=>i.id===f.inspection_id);const pid=insp?insp.property_id:null;if(!pid)continue;(byProp[pid]=byProp[pid]||[]).push(f);}
    for(const pid of Object.keys(byProp)){
      const p=state.properties.find(x=>x.id===pid);if(!p)continue;
      const fs=byProp[pid];const high=fs.filter(f=>f.severity==='high').length;
      const sub=[esc(p.name),high?`${high} high-severity`:'From your latest inspection'].join(' · ');
      rows.push(`<div class="attn-row" data-finding-prop="${pid}">
        <div class="attn-main"><div class="attn-title"><span class="attn-dot" style="background:${high?'var(--red)':'var(--amber)'}"></span>${fs.length} open finding${fs.length>1?'s':''}</div>
          <div class="attn-sub">${sub}</div></div>
        <span class="attn-go">Review ${arrow}</span></div>`);
    }
  }
  if(!rows.length)return '';
  return `<div class="attn"><div class="attn-h">Needs your attention</div>${rows.join('')}</div>`;
}

function scrTechToday(){

/* ---------- requests ---------- */
function reqStatusPill(s){const m={pending:['p-amber','Pending'],processed:['p-green','Scheduled'],declined:['p-gray','Declined']}[s]||['p-gray',s];return `<span class="pill ${m[0]}">${m[1]}</span>`;}
function reqInspection(r){
  let insp=state.inspections.find(i=>i.request_id===r.id);
  if(!insp&&r.processed_property_id){insp=state.inspections.filter(i=>i.property_id===r.processed_property_id).sort((a,b)=>String(b.scheduled_date||b.created_at||'').localeCompare(String(a.scheduled_date||a.created_at||'')))[0]||null;}
  return insp||null;
}
function reqStage(r){
  if(r.status==='declined')return {note:'Request declined',terminal:'declined'};
  if(r.status==='pending')return {note:'New request — awaiting review',idx:0};
  const insp=reqInspection(r);
  if(insp){const st=projectStage(insp);return {note:st.note,idx:st.idx,terminal:st.terminal};}
  return {note:'Inspection scheduled',idx:1};
}
function reqCards(list,staff){
  if(!list.length)return '<div class="empty">No requests.</div>';
  return list.map(r=>{
    const loc=[r.address,[r.city,r.state].filter(Boolean).join(', '),r.zip].filter(Boolean).join(' · ');
    const who=staff?((r.organizations&&r.organizations.name)||'Client'):'';
    const contact=[r.contact_name,r.contact_phone].filter(Boolean).join(' · ');
    const isExisting=!!r.property_id;
    const isEst=(r.notes||'').toLowerCase().startsWith('estimate');
    const typePill=`<span class="pill ${isEst?'p-amber':'p-blue'}" style="font-size:10px">${isEst?'Estimate':'Inspection'}</span>`;
    const st=reqStage(r);
    const noteCls=st.terminal==='declined'?' stop':(st.terminal==='complete'?' done':'');
    const arrow=st.terminal==='declined'?'\u2715':(st.terminal==='complete'?'\u2713':'\u2192');
    return `<div class="card" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div><h3>${esc(r.property_name||'Untitled property')}</h3>
        <div class="sub2">${staff?esc(who)+' · ':''}${isExisting?'Existing property · ':''}${esc(r.property_type||'')}${r.created_at?' · '+fmtDate(r.created_at):''}</div></div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">${reqStatusPill(r.status)}${typePill}</div></div>
      <div class="meta" style="margin-top:8px">${loc?esc(loc):'No address given'}${contact?'<br>Contact: '+esc(contact):''}${r.preferred_timeframe?'<br>Preferred: '+esc(r.preferred_timeframe):''}${r.notes?'<br>'+esc(r.notes):''}</div>
      ${st.note?`<div class="ps-note${noteCls}" style="margin-top:10px;font-size:12.5px">${arrow} ${esc(st.note)}</div>`:''}
      ${staff&&r.status==='pending'?`<div class="cardfoot"><button class="btn btn-primary btn-sm" data-schedule-req="${r.id}">Schedule inspection</button><button class="btn btn-ghost btn-sm" data-decline-req="${r.id}">Decline</button></div>`:''}
      ${staff&&r.status==='processed'?`<div class="cardfoot"><button class="btn btn-ghost btn-sm" data-est-from-req="${r.id}">Create estimate</button></div>`:''}
    </div>`;
  }).join('');
}
function applyReqSearch(list){return list.filter(r=>matches(state.q,r.property_name,(r.organizations&&r.organizations.name),r.city,r.status));}
function scrRequests(){
  const staff=state.role==='staff';
  if(!staff){
    return `<div class="rowtop"><div><div class="ph">Request an Assessment</div><div class="psub">Ask our team to assess one of your properties.</div></div>

/* ---------- modal system ---------- */
function modal(title,fields,onSave){
  const ctrl=f=>f.controls?` data-mcontrol="${f.controls.group}" data-mshow="${esc(f.controls.show)}"`:'';
  const attrs=f=>f.attrs?(' '+f.attrs):'';
  const render=f=>{
    let el;
    if(f.type==='custom')el=f.html;
    else if(f.type==='select')el=`<label>${f.label}</label><select class="field" data-mk="${f.key}"${ctrl(f)}${attrs(f)}>${f.options.map(o=>{const v=(o.value!==undefined?o.value:o),l=(o.label!==undefined?o.label:o);return `<option value="${esc(v)}" ${((f.value||'')===v)?'selected':''}>${esc(l)}</option>`;}).join('')}</select>`;
    else if(f.type==='textarea')el=`<label>${f.label}</label><textarea class="field" data-mk="${f.key}" rows="3" style="resize:vertical"${attrs(f)}>${esc(f.value||'')}</textarea>`;
    else el=`<label>${f.label}</label><input class="field" type="${f.type||'text'}" data-mk="${f.key}" value="${esc(f.value||'')}"${attrs(f)}/>`;
    return f.group?`<div data-mgroup="${f.group}">${el}</div>`:el;
  };
  const body=fields.map(render).join('');
  $('scrim').innerHTML=`<div class="modal"><h3>${esc(title)}</h3>${body}<div class="mrow"><button class="btn btn-ghost" data-mclose>Cancel</button><button class="btn btn-primary" data-msave>Save</button></div></div>`;
  $('scrim').classList.add('show');
  $('scrim')._save=onSave;
  updateModalFilteredProperties();
  applyGroupToggles();
}
function propSelectOptionsForOrg(orgId,{includeNone=false,includeNew=false}={}){
  const opts=[];
  if(includeNone)opts.push({value:'',label:'— None —'});
  state.properties.filter(p=>p.org_id===orgId).forEach(p=>opts.push({value:p.id,label:p.name}));
  if(includeNew)opts.push({value:'__new__',label:'＋ Add new property'});
  return opts;
}
function updateModalFilteredProperties(){
  const root=$('scrim');
  const client=root.querySelector('[data-client-select]');
  const prop=root.querySelector('[data-property-filter]');
  if(!client||!prop)return;
  const current=prop.dataset.pendingValue||prop.value;
  const opts=propSelectOptionsForOrg(client.value,{includeNone:prop.dataset.includeNone==='1',includeNew:prop.dataset.includeNew==='1'});
  prop.innerHTML=opts.map(o=>`<option value="${esc(o.value)}">${esc(o.label)}</option>`).join('');
  prop.value=opts.some(o=>String(o.value)===String(current))?current:(opts[0]?.value||'');
  delete prop.dataset.pendingValue;
}
function applyGroupToggles(){
  const c=$('scrim').querySelector('[data-mcontrol]'); if(!c)return;
  const show=c.value===c.dataset.mshow, g=c.dataset.mcontrol;
  $('scrim').querySelectorAll(`[data-mgroup="${g}"]`).forEach(el=>el.style.display=show?'':'none');

let pendingPhoto=null, removePhoto=false;
function photoBlock(p){

    <div class="dz" id="dz">${src?`<img id="dz-img" src="${src}" alt="Cover photo"/>`:`<div class="dz-empty" id="dz-empty"><b>Add a cover photo</b><br>Drag &amp; drop an image here, or click to choose</div>`}</div>

function wireDropzone(){
  const dz=$('scrim').querySelector('#dz'); if(!dz)return;
  const pick=()=>$('pfile').click();
  dz.addEventListener('click',pick);
  $('scrim').querySelectorAll('[data-dz-pick]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();pick();}));
  $('scrim').querySelectorAll('[data-dz-remove]').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();removePhoto=true;pendingPhoto=null;dz.innerHTML='<div class="dz-empty"><b>Photo will be removed</b><br>Drag &amp; drop or click to choose a new one</div>';}));
  ['dragover','dragenter'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.add('over');}));
  ['dragleave','drop'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();dz.classList.remove('over');}));
  dz.addEventListener('drop',e=>{const f=e.dataTransfer.files&&e.dataTransfer.files[0];if(f)setPendingPhoto(f);});
}
function setPendingPhoto(file){
  if(!file||!file.type.startsWith('image/'))return toast('Choose an image file');
  pendingPhoto=file;removePhoto=false;
  const dz=$('scrim').querySelector('#dz'); if(!dz)return;
  const url=URL.createObjectURL(file);
  dz.innerHTML=`<img src="${url}" alt="Cover photo preview"/>`;
}
$('pfile').addEventListener('change',e=>{const f=e.target.files[0];e.target.value='';if(f)setPendingPhoto(f);});
async function saveCoverPhoto(prop){
  if(removePhoto&&prop.cover_photo_path&&!pendingPhoto){
    await sb.storage.from('property-photos').remove([prop.cover_photo_path]).catch(()=>{});
    await sb.from('properties').update({cover_photo_path:null}).eq('id',prop.id);
    return;
  }
  if(!pendingPhoto)return;
  const ext=(pendingPhoto.name.split('.').pop()||'jpg').toLowerCase();
  const path=`${prop.org_id}/${prop.id}/${crypto.randomUUID()}.${ext}`;
  const {error}=await sb.storage.from('property-photos').upload(path,pendingPhoto,{upsert:false});
  if(error){toast('Photo upload failed: '+error.message);return;}
  if(prop.cover_photo_path)await sb.storage.from('property-photos').remove([prop.cover_photo_path]).catch(()=>{});
  await sb.from('properties').update({cover_photo_path:path}).eq('id',prop.id);
}

/* ---------- project stage stepper ---------- */
const PROJECT_STAGES=['Requested','Inspection','Estimate','Approved','Work Order','Complete'];
function projectStage(insp){
  const ests=state.estimates.filter(e=>e.inspection_id===insp.id).sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')));
  const est=ests[0]||null;
  const job=est?(state.jobs||[]).find(j=>j.estimate_id===est.id):null;
  const S={REQ:0,INSP:1,EST:2,APP:3,WORK:4,DONE:5};
  let idx=S.INSP,note='',terminal=null;
  if(insp.status==='scheduled'){idx=S.INSP;note='Inspection scheduled'+(insp.scheduled_date?' for '+fmtDate(insp.scheduled_date):'');}
  else if(insp.status==='draft'){idx=S.INSP;note='Inspection in progress';}
  else if(insp.status==='complete'){
    idx=S.EST;note='Findings under review — estimate being prepared';
    if(est){
      if(est.status==='draft'){idx=S.EST;note='Estimate being prepared';}
      else if(est.status==='sent'){idx=S.APP;note='Estimate sent — awaiting your approval';}
      else if(est.status==='revision_requested'){idx=S.APP;note='Revision requested on the estimate';}
      else if(est.status==='declined'){idx=S.APP;terminal='declined';note='Estimate declined';}
      else if(['approved','invoiced','paid'].includes(est.status)){
        if(!job){idx=S.WORK;note='Estimate approved — scheduling work';}
        else if(job.status==='scheduled'){idx=S.WORK;note='Work scheduled'+(job.scheduled_date?' for '+fmtDate(job.scheduled_date):'');}
        else if(job.status==='in_progress'){idx=S.WORK;note='Work in progress';}
        else if(job.status==='cancelled'){idx=S.WORK;note='Work order cancelled';}
        else if(job.status==='done'){idx=S.DONE;terminal='complete';note=est.status==='paid'?'Completed and paid':(est.status==='invoiced'?'Completed — invoice sent':'Work complete');}
      }
    }
  }
  return {idx,note,terminal,est,job};
}
function stepperHTML(idx,note,terminal){
  const done=terminal==='complete';
  const steps=PROJECT_STAGES.map((s,k)=>{
    let cls='st-up';
    if(done||k<idx)cls='st-done';
    else if(k===idx)cls=(terminal==='declined')?'st-stop':'st-cur';
    const mark=(done||k<idx)?'\u2713':(k+1);
    return `<div class="step ${cls}"><span class="dot">${mark}</span><span class="lbl">${s}</span></div>`;
  }).join('');
  const nc=terminal==='declined'?'ps-note stop':(done?'ps-note done':'ps-note');
  const arrow=terminal==='declined'?'\u2715':(done?'\u2713':'\u2192');
  return `<div class="pcard"><div class="pc-h">Project status</div><div class="pstepper">${steps}</div>${note?`<div class="${nc}">${arrow} ${esc(note)}</div>`:''}</div>`;
}
function projectStepper(p){
  const insps=state.inspections.filter(i=>i.property_id===p.id);
  if(insps.length){
    const scored=insps.map(i=>({i,st:projectStage(i)}));
    const dateOf=x=>x.i.scheduled_date||x.i.inspection_date||x.i.created_at||'';
    const active=scored.filter(s=>s.st.terminal!=='complete');
    const pick=(active.length?active:scored).sort((a,b)=>String(dateOf(b)).localeCompare(String(dateOf(a))))[0];
    return stepperHTML(pick.st.idx,pick.st.note,pick.st.terminal);
  }
  const reqs=(state.requests||[]).filter(r=>r.property_id===p.id&&!['declined','cancelled','completed','complete'].includes(r.status));
  if(reqs.length)return stepperHTML(0,'Assessment requested — inspection being scheduled',null);
  return '';
}

/* documents */
async function uploadDocument(){
  const p=state.properties.find(x=>x.id===state.currentPropId); if(!p)return;
  const input=document.createElement('input');input.type='file';
  input.onchange=async()=>{
    const file=input.files[0]; if(!file)return;
    toast('Uploading…');
    const ext=(file.name.split('.').pop()||'bin').toLowerCase();
    const path=`${p.org_id}/${p.id}/${crypto.randomUUID()}.${ext}`;
    const {error:upErr}=await sb.storage.from('reports').upload(path,file,{upsert:false});
    if(upErr)return toast('Upload failed: '+upErr.message);
    const {error}=await sb.from('documents').insert({org_id:p.org_id,property_id:p.id,name:file.name,storage_path:path,file_type:ext.toUpperCase(),uploaded_by:state.userId});
    if(error)return toast('Save failed: '+error.message);
    toast('Document uploaded');
    openProperty(p.id); state.ptab='documents';
  };

}
async function downloadDocument(id){
  const doc=(state.propDetail&&state.propDetail.docs||[]).find(x=>x.id===id); if(!doc)return;
  const {data,error}=await sb.storage.from('reports').createSignedUrl(doc.storage_path,300);
  if(error||!data)return toast('Could not open document');
  const a=document.createElement('a');a.href=data.signedUrl;a.target='_blank';a.rel='noopener';a.click();
}
async function deleteDocument(id){
  const doc=(state.propDetail&&state.propDetail.docs||[]).find(x=>x.id===id); if(!doc)return;
  if(!confirm('Delete "'+doc.name+'"?'))return;
  await sb.storage.from('reports').remove([doc.storage_path]).catch(()=>{});

/* ---------- schedule ---------- */
function ymd(d){return d.toISOString().slice(0,10);}
function parseYMD(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function monthLabel(d){return d.toLocaleDateString(undefined,{month:'long',year:'numeric'});}
function techNameOf(id){const s=state.staff.find(x=>x.id===id);return s?(s.full_name||s.email||'Staff'):'';}
function jobPropName(j){const p=state.properties.find(x=>x.id===j.property_id);return p?p.name:(j.title||'Job');}
function jobClientName(j){if(j.organizations&&j.organizations.name)return j.organizations.name;const o=state.orgs.find(x=>x.id===j.org_id);return o?o.name:'';}
/* collect all schedule events → [{date,type,title,meta,id,onclick}] */
function scheduleEvents(){
  const ev=[];
  for(const i of state.inspections){
    if(i.scheduled_date&&i.status!=='complete')ev.push({date:i.scheduled_date,type:'insp',title:inspPropName(i),meta:(inspClientName(i)||'')+(i.assigned_to?' · '+techNameOf(i.assigned_to):''),id:i.id,kind:'inspection'});
  }
  for(const j of state.jobs){
    if(j.scheduled_date&&j.status!=='cancelled')ev.push({date:j.scheduled_date,type:'job',title:j.title||jobPropName(j),meta:jobClientName(j)+(j.assigned_to?' · '+techNameOf(j.assigned_to):''),id:j.id,kind:'job'});
  }
  for(const e of state.estimates){
    if(e.valid_until&&(e.status==='sent'||e.status==='revision_requested'))ev.push({date:e.valid_until,type:'est',title:(e.title||'Estimate')+' expires',meta:estClientName(e)+' · '+money(e.total),id:e.id,kind:'estimate'});
  }
  return ev;
}
function evClass(t){return t;}
function evTypeLabel(t){return {insp:'Inspection',job:'Work',est:'Estimate'}[t]||t;}
function evColor(t){return {insp:'var(--blue)',job:'var(--orange)',est:'var(--amber)'}[t];}
function scrSchedule(){
  if(!state.schedMonth){const n=new Date();state.schedMonth=new Date(n.getFullYear(),n.getMonth(),1);}
  const staff=state.role==='staff';
  const head=`<div class="rowtop"><div><div class="ph">Schedule</div></div>
    <div style="display:flex;gap:10px;align-items:center">
      <div class="seg-toggle"><button class="${state.schedView==='month'?'on':''}" data-sched-view="month">Month</button><button class="${state.schedView==='agenda'?'on':''}" data-sched-view="agenda">Agenda</button></div>
      ${staff?'<button class="btn btn-primary" data-act="new-job">+ Schedule work</button>':''}
    </div></div>
    <div class="legend"><span><i class="lg-insp"></i> Inspections</span><span><i class="lg-job"></i> Work / jobs</span><span><i class="lg-est"></i> Estimate dates</span></div>`;
  return head+(state.schedView==='month'?calMonth():calAgenda());
}
function calMonth(){
  const first=state.schedMonth;
  const y=first.getFullYear(),m=first.getMonth();
  const start=new Date(y,m,1);const startDow=start.getDay();
  const gridStart=new Date(y,m,1-startDow);
  const evByDay={};
  for(const e of scheduleEvents()){(evByDay[e.date]=evByDay[e.date]||[]).push(e);}
  const todayStr=today();
  let cells='';
  for(let i=0;i<42;i++){
    const d=new Date(gridStart);d.setDate(gridStart.getDate()+i);
    const ds=ymd(d);const other=d.getMonth()!==m;
    const evs=evByDay[ds]||[];
    const shown=evs.slice(0,3);
    cells+=`<div class="cal-cell ${other?'other':''} ${ds===todayStr?'today':''}" data-sched-day="${ds}">
      <span class="dn">${d.getDate()}</span>
      ${shown.map(e=>`<div class="ev ${evClass(e.type)}">${esc(e.title)}</div>`).join('')}
      ${evs.length>3?`<div class="ev-more">+${evs.length-3} more</div>`:''}</div>`;
  }
  const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  return `<div class="cal-head">
      <div class="cal-nav"><button class="btn btn-ghost btn-sm" data-sched-mo="-1">‹</button><button class="btn btn-ghost btn-sm" data-sched-mo="0">Today</button><button class="btn btn-ghost btn-sm" data-sched-mo="1">›</button></div>
      <div class="mo">${monthLabel(first)}</div></div>
    <div class="cal"><div class="cal-dow">${DOW.map(d=>`<div>${d}</div>`).join('')}</div><div class="cal-grid">${cells}</div></div>`;
}
function calAgenda(){
  const all=scheduleEvents().filter(e=>e.date>=today()).sort((a,b)=>a.date.localeCompare(b.date));
  if(!all.length)return '<div class="empty">Nothing scheduled ahead. Use “Schedule work” or schedule an inspection to populate the calendar.</div>';
  const byDay={};for(const e of all){(byDay[e.date]=byDay[e.date]||[]).push(e);}
  const todayStr=today();
  return Object.keys(byDay).sort().map(ds=>{
    const d=parseYMD(ds);const isToday=ds===todayStr;
    const label=d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
    return `<div class="agenda-day"><div class="agenda-date">${label}${isToday?' <span class="pill p-amber">Today</span>':''}</div>
      ${byDay[ds].map(e=>`<div class="arow" style="--ac:${evColor(e.type)}" ${schedRowAttr(e)}>
        <span class="atype" style="background:${e.type==='insp'?'var(--blue-soft)':e.type==='job'?'var(--orange-soft)':'var(--amber-soft)'};color:${evColor(e.type)}">${evTypeLabel(e.type)}</span>
        <div style="min-width:0"><div class="atitle">${esc(e.title)}</div>${e.meta?`<div class="ameta">${esc(e.meta)}</div>`:''}</div>
      </div>`).join('')}</div>`;
  }).join('');
}
function schedRowAttr(e){
  if(e.kind==='inspection')return `data-open-insp-row="${e.id}"`;
  if(e.kind==='job')return `data-open-job="${e.id}"`;
  if(e.kind==='estimate')return `data-open-est="${e.id}"`;
  return '';
}
function dayModal(ds){
  const evs=scheduleEvents().filter(e=>e.date===ds);
  const d=parseYMD(ds);
  const label=d.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});
  const body=evs.length?evs.map(e=>`<div class="arow" style="--ac:${evColor(e.type)};margin-bottom:8px" ${schedRowAttr(e)}>
      <span class="atype" style="background:${e.type==='insp'?'var(--blue-soft)':e.type==='job'?'var(--orange-soft)':'var(--amber-soft)'};color:${evColor(e.type)}">${evTypeLabel(e.type)}</span>
      <div style="min-width:0"><div class="atitle">${esc(e.title)}</div>${e.meta?`<div class="ameta">${esc(e.meta)}</div>`:''}</div></div>`).join('')
    :'<div class="empty" style="padding:24px">Nothing scheduled this day.</div>';
  $('scrim').innerHTML=`<div class="modal"><h3>${label}</h3>${body}<div class="mrow">${state.role==='staff'?`<button class="btn btn-ghost" data-new-job-day="${ds}">+ Schedule work</button>`:''}<button class="btn btn-primary" data-mclose>Done</button></div></div>`;
  $('scrim').classList.add('show');
}

function estStaffActions(e){

/* estimate CRUD + transitions */
function openEstimate(id){state.currentEstId=id;view='estimate';render();}
async function newEstimate(preset){
  if(!state.orgs.length)return toast('Add a client first');
  const orgOpts=state.orgs.map(o=>({value:o.id,label:o.name}));
  const preProp=preset?.property_id?state.properties.find(p=>p.id===preset.property_id):null;
  const defOrg=preset?.org_id||preProp?.org_id||state.orgs[0].id;
  const defProp=preProp?.id||'';
  modal('New estimate',[
    {key:'org_id',label:'Client',type:'select',value:defOrg,options:orgOpts,attrs:'data-client-select'},
    {key:'property_id',label:'Property (optional)',type:'select',value:defProp,options:propSelectOptionsForOrg(defOrg,{includeNone:true}),attrs:`data-property-filter data-include-none="1" data-pending-value="${esc(defProp)}"`},
    {key:'title',label:'Title',value:preset?.title||''},
    {key:'total',label:'Total (USD)',type:'number',value:''},
    {key:'scope',label:'Scope of work',type:'textarea',value:preset?.scope||''},
    {key:'valid_until',label:'Valid until (optional)',type:'date',value:''}
  ],async v=>{
    if(!v.title)return toast('Give the estimate a title');
    if(!v.total)return toast('Enter a total');

      title:v.title,total:parseFloat(v.total),scope:v.scope||null,valid_until:v.valid_until||null,
      status:'draft',created_by:state.userId
    };
    if(preset?.finding_id)payload.finding_id=preset.finding_id;

async function editEstimate(e){
  modal('Edit estimate',[
    {key:'title',label:'Title',value:e.title||''},
    {key:'total',label:'Total (USD)',type:'number',value:e.total||''},
    {key:'scope',label:'Scope of work',type:'textarea',value:e.scope||''},
    {key:'valid_until',label:'Valid until (optional)',type:'date',value:e.valid_until||''}
  ],async v=>{
    if(!v.title||!v.total)return toast('Title and total are required');
    // editing a revision-requested estimate resends it (back to sent, clears note)
    const patch={title:v.title,total:parseFloat(v.total),scope:v.scope||null,valid_until:v.valid_until||null};
    if(e.status==='revision_requested'){patch.status='sent';patch.client_note=null;}
    const {error}=await sb.from('estimates').update(patch).eq('id',e.id);
    if(error)return toast('Error: '+error.message);
    closeModal();await loadData();render();toast(e.status==='revision_requested'?'Revised estimate resent':'Estimate updated');
  });
}
async function estTransition(id,patch,msg){
  const {error}=await sb.from('estimates').update(patch).eq('id',id);
  if(error)return toast('Error: '+error.message);
  if(patch.status==='sent')notify('estimate_sent',id);
  else if(patch.status==='approved'||patch.status==='declined'||patch.status==='revision_requested')notify('estimate_decided',id);
  await loadData();render();toast(msg);
}

function scrFindings(){
  const i=state.currentInsp; if(!i)return scrInspections();
  const ratings=i.ratings||{};
  const r=Object.values(ratings),c=t=>r.filter(x=>x===t).length;
  const F=state.currentFindings,P=state.currentPhotos;
  const obsAll=i.observations||{};

  const ORDER=['safety','security','lighting','traffic','compliance'];
  const areas={}; ORDER.forEach(d=>areas[d]={a:0,w:0,d:0,n:0,total:0});
  for(const [k,v] of Object.entries(ratings)){const dom=PREFIX[k.slice(0,2)];if(dom&&areas[dom]&&v){areas[dom][v]=(areas[dom][v]||0)+1;areas[dom].total++;}}
  const CHIP=[['a','Acceptable','var(--green-soft)','var(--green)'],['w','Needs attention','var(--amber-soft)','var(--amber)'],['d','Deficiency','var(--red-soft)','var(--red)'],['n','N/A','var(--gray-soft)','var(--gray-t)']];
  const areaCards=ORDER.filter(d=>areas[d].total>0||(obsAll[d]&&String(obsAll[d]).trim())).map(d=>{
    const s=areas[d];
    const chips=CHIP.filter(([key])=>s[key]>0).map(([key,label,bg,col])=>`<span style="font-size:12px;font-weight:600;padding:4px 10px;border-radius:999px;background:${bg};color:${col}">${s[key]} ${label}</span>`).join('');

  }).join('');
  return `<div class="rowtop"><div><div class="ph">${esc(inspPropName(i))}</div>
      <div class="psub">${inspClientName(i)?esc(inspClientName(i))+' · ':''}Completed ${esc(fmtDate(i.inspection_date))}${i.technician?' · '+esc(i.technician):''}</div></div>

    <div class="sec-h" id="findings-sec">Flagged items</div>
    ${F.length?F.map(f=>findingCard(f,i,state.role==='staff')).join(''):'<div class="empty">No deficiencies recorded — no issues found during this assessment.</div>'}
    ${areaCards?`<div class="sec-h">Inspection areas</div>${areaCards}`:''}
    ${(()=>{const m=new Set();F.forEach(f=>findingPhotos(f).forEach(p=>m.add(p.id||p.photo_no)));const rest=P.filter(p=>!m.has(p.id||p.photo_no));return rest.length?`<div class="sec-h">Other photos</div><div class="grid">${rest.map(p=>`<div class="card" style="padding:0;overflow:hidden">${p.url?`<img src="${p.url}" style="width:100%;height:150px;object-fit:cover;display:block"/>`:'<div style="height:150px;background:var(--gray-soft)"></div>'}<div style="padding:11px"><div style="font-weight:600;font-size:13px">${esc(p.area||'Photo')}</div><div class="meta">${esc(p.description||'')}</div></div></div>`).join('')}</div>`:'';})()}`;
}

  const tech=j.assigned_to?techNameOf(j.assigned_to):'';
  const meta2=[tech?'Tech: '+tech:'',est?money(est.total):''].filter(Boolean).join(' · ');
  return `<div class="kitem"><div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start"><b>${esc(j.title||'Work order')}${j.job_no?` <span class="sub2 mono">#${esc(j.job_no)}</span>`:''}</b>${jobStatusPill(j.status)}</div>
    <div class="sub2" style="margin-top:4px">${esc(fmtDate(j.scheduled_date)||'Not scheduled')} · ${esc(jobClientName(j)||'No client')}</div>
    <div class="meta">${esc(jobPropName(j)||j.scope||'')}</div>
    ${meta2?`<div class="meta">${esc(meta2)}</div>`:''}
    <div class="cardfoot"><button class="btn btn-ghost btn-sm" data-open-job="${j.id}">Open</button>${state.role==='staff'?`<button class="btn btn-ghost btn-sm" data-edit-job="${j.id}">Edit</button>`:''}</div></div>`;
}
function scrJobs(){
  const tech=state.role==='tech';
  const actions=state.role==='staff'?`<button class="btn btn-primary" data-act="new-job">+ New work order</button>`:'';
  const jobs=(state.jobs||[]).filter(j=>matches(state.q,j.title,j.scope,jobClientName(j),jobPropName(j),j.status));
  const cols=[['scheduled','Scheduled'],['in_progress','In progress'],['done','Completed'],['cancelled','Waiting / cancelled']];
  const colHTML=cols.map(([st,label])=>{
    const rows=jobs.filter(j=>j.status===st);
    if(!rows.length)return '';
    return `<div class="kcol"><div class="kcol-h">${label}<span class="kn">${rows.length}</span></div>${rows.slice(0,50).map(jobCard).join('')}</div>`;
  }).filter(Boolean).join('');
  return pageHead(tech?'My Jobs':'Work Orders',tech?'Your assigned work orders.':'Approved work from scheduling through completion.',actions)+
    (colHTML?`<div class="kanban">${colHTML}</div>`:`<div class="empty">${state.q?'No work orders match your search.':'No work orders yet. Create one from an approved estimate.'}</div>`);
}
function prefVal(key,def=false){return state.notificationPrefs&&state.notificationPrefs[key]!==undefined?!!state.notificationPrefs[key]:def;}
function settingSwitch(key,title,desc,def=true){return `<div class="settings-row"><div><div class="st-title">${esc(title)}</div>${desc?`<div class="st-desc">${esc(desc)}</div>`:''}</div><label class="switch"><input type="checkbox" data-pref="${key}" ${prefVal(key,def)?'checked':''}><span class="slider"></span></label></div>`;}
function scrAccount(){
  const isTech=state.role==='tech';
  const nm=state.profile?.full_name||state.email||'User';
  return pageHead(isTech?'My Profile':'Account Settings','',`<button class="btn btn-primary" data-profile-edit>Edit profile</button>`)+
  `<div class="dash2"><div><div class="card"><h3>${esc(nm)}</h3><div class="meta">${esc(state.email)} · ${esc(state.role)}${state.profile?.phone?' · '+esc(state.profile.phone):''}${state.profile?.title?' · '+esc(state.profile.title):''}</div><div class="cardfoot"><button class="btn btn-ghost btn-sm" data-profile-edit>Edit profile</button><button class="btn btn-ghost btn-sm" data-security-edit>Security</button></div></div><div class="sec-h">Notification preferences</div><div class="settings-list">${settingSwitch('email_updates','Email updates','')}${settingSwitch('sms_alerts','SMS alerts','',false)}${settingSwitch('weekly_summary','Weekly summary','')}${settingSwitch('estimate_updates','Estimate updates','')}${settingSwitch('work_order_updates','Work order updates','')}${settingSwitch('marketing_emails','Marketing emails','',false)}</div></div><div><div class="card"><h3>Company settings</h3><div class="meta"></div><div class="cardfoot"><button class="btn btn-ghost btn-sm" data-company-edit>Edit company</button></div></div><div class="card" style="margin-top:14px"><h3>Security</h3><div class="kv"><span class="k">Password</span><span class="v">Change</span></div><div class="kv"><span class="k">Two-factor auth</span><span class="v">Set up</span></div><div class="kv"><span class="k">Login history</span><span class="v">View</span></div></div></div></div>`;
}
async function savePreference(key,checked){
  const patch={user_id:state.userId,[key]:checked,updated_at:new Date().toISOString()};
  const {error}=await sb.from('notification_preferences').upsert(patch,{onConflict:'user_id'});
  if(error)return toast('Preference save failed: '+error.message);
  state.notificationPrefs={...(state.notificationPrefs||{}),...patch}; toast('Preference saved');
}
function profileModal(){modal('Edit profile',[{key:'full_name',label:'Full name',value:state.profile?.full_name||''},{key:'phone',label:'Phone',type:'tel',value:state.profile?.phone||''},{key:'title',label:'Title / role',value:state.profile?.title||''}],async v=>{const patch={full_name:v.full_name||null,phone:v.phone||null,title:v.title||null};const {error}=await sb.from('profiles').update(patch).eq('id',state.userId);if(error)return toast('Error: '+error.message);closeModal();await loadApp();toast('Profile updated');});}
function securityModal(){modal('Security settings',[{key:'password',label:'New password',type:'password',value:''},{key:'confirm',label:'Confirm password',type:'password',value:''}],async v=>{if(!v.password||v.password!==v.confirm)return toast('Passwords must match');const {error}=await sb.auth.updateUser({password:v.password});if(error)return toast('Error: '+error.message);closeModal();toast('Password updated');});}
function companyModal(){modal('Company information',[{key:'company_name',label:'Company name',value:(state.orgs[0]&&state.orgs[0].name)||''},{key:'billing_email',label:'Billing email',type:'email',value:''},{key:'emergency_phone',label:'Emergency phone',type:'tel',value:''}],async()=>{closeModal();toast('Company settings saved');});}

/* ---------- events ---------- */
document.addEventListener('click',e=>{
  const pm=$('pmenu');
  if(e.target.closest('#profile-btn')){pm.classList.toggle('show');return;}
  if(!e.target.closest('#pmenu'))pm.classList.remove('show');

  const more=e.target.closest('[data-more]');
  if(more){const sheet=$('more-sheet'); if(sheet)sheet.classList.toggle('show'); return;}
  const n=e.target.closest('[data-nav]'); if(n){view=n.dataset.nav; state.q='';$('gsearch').value=''; if(view==='accounts'&&!state.accountsLoaded)loadAccounts(); render();return;}
  if(e.target.closest('[data-profile-edit]')){profileModal();return;}
  if(e.target.closest('[data-security-edit]')){securityModal();return;}
  if(e.target.closest('[data-company-edit]')){companyModal();return;}
  const ns=e.target.closest('[data-nav-stat]'); if(ns){view=ns.dataset.navStat; state.q='';$('gsearch').value=''; render();return;}
  /* schedule */
  const sv=e.target.closest('[data-sched-view]'); if(sv){state.schedView=sv.dataset.schedView;render();return;}
  const smo=e.target.closest('[data-sched-mo]'); if(smo){const delta=+smo.dataset.schedMo;const c=state.schedMonth||new Date();state.schedMonth=delta===0?(()=>{const n=new Date();return new Date(n.getFullYear(),n.getMonth(),1);})():new Date(c.getFullYear(),c.getMonth()+delta,1);render();return;}
  const sd=e.target.closest('[data-sched-day]'); if(sd){dayModal(sd.dataset.schedDay);return;}
  if(e.target.closest('[data-act="new-job"]')){newJob(null);return;}
  const njd=e.target.closest('[data-new-job-day]'); if(njd){closeModal();newJob({scheduled_date:njd.dataset.newJobDay});return;}
  const oj=e.target.closest('[data-open-job]'); if(oj){openJob(oj.dataset.openJob);return;}
  const oir=e.target.closest('[data-open-insp-row]'); if(oir){const ins=state.inspections.find(x=>x.id===oir.dataset.openInspRow);if(ins&&ins.status==='complete'){openFindings(ins.id);}else if(canInspect()){location.href='inspection.html?inspection='+oir.dataset.openInspRow;}else{toast('This report will be available once the inspection is complete.');}return;}
  const sjb=e.target.closest('[data-save-job]'); if(sjb){saveJobStatus(sjb.dataset.saveJob);return;}
  const ejb=e.target.closest('[data-edit-job]'); if(ejb){editJob(state.jobs.find(x=>x.id===ejb.dataset.editJob));return;}
  const esch=e.target.closest('[data-est-schedule]'); if(esch){const es=state.estimates.find(x=>x.id===esch.dataset.estSchedule);newJob({org_id:es.org_id,property_id:es.property_id||'',estimate_id:es.id,title:es.title||'Approved work',scope:es.scope||''});return;}
  if(e.target.closest('[data-act="new-inspection"]')){if(!canInspect())return;location.href='inspection.html';return;}
  if(e.target.closest('[data-act="request-assessment"]')){requestAssessment();return;}
  if(e.target.closest('[data-act="request-service"]')){requestService();return;}
  if(e.target.closest('[data-act="schedule-inspection"]')){scheduleNew();return;}
  const sp=e.target.closest('[data-sched-prop]'); if(sp){scheduleNew(sp.dataset.schedProp);return;}
  if(e.target.closest('[data-act="create-account"]')){createAccount();return;}
  const eacc=e.target.closest('[data-edit-acc]'); if(eacc){editAccount(state.accounts.find(a=>a.id===eacc.dataset.editAcc));return;}
  const racc=e.target.closest('[data-reset-acc]'); if(racc){resetPassword(state.accounts.find(a=>a.id===racc.dataset.resetAcc));return;}
  const dacc=e.target.closest('[data-del-acc]'); if(dacc){deleteAccount(state.accounts.find(a=>a.id===dacc.dataset.delAcc));return;}
  if(e.target.closest('[data-act="add-client"]')){addClient(null);return;}
  if(e.target.closest('[data-act="add-property"]')){addProperty(null);return;}
  const ic=e.target.closest('[data-invite-client]'); if(ic){inviteClient(state.orgs.find(o=>o.id===ic.dataset.inviteClient));return;}
  const ec=e.target.closest('[data-edit-client]'); if(ec){addClient(state.orgs.find(o=>o.id===ec.dataset.editClient));return;}
  const ep=e.target.closest('[data-edit-property]'); if(ep){addProperty(state.properties.find(p=>p.id===ep.dataset.editProperty));return;}
  /* table controls */
  const ts=e.target.closest('th[data-sort]'); if(ts){const t=tstate(ts.dataset.tid);const k=ts.dataset.sort;if(t.sort===k)t.dir*=-1;else{t.sort=k;t.dir=1;}t.page=1;render();return;}
  const tf=e.target.closest('[data-tfilter]'); if(tf){const t=tstate(tf.dataset.tid);t.filter=tf.dataset.tfilter;t.page=1;render();return;}
  const tp=e.target.closest('[data-tpage]'); if(tp&&!tp.disabled){const t=tstate(tp.dataset.tid);t.page+=tp.dataset.tpage==='next'?1:-1;render();return;}
  /* property detail */
  const ptab=e.target.closest('[data-ptab]'); if(ptab){state.ptab=ptab.dataset.ptab;render();return;}
  if(e.target.closest('[data-back-props]')){view='properties';state.currentPropId=null;render();return;}
  if(e.target.closest('[data-doc-upload]')){uploadDocument();return;}
  const ddl=e.target.closest('[data-doc-dl]'); if(ddl){downloadDocument(ddl.dataset.docDl);return;}
  const ddel=e.target.closest('[data-doc-del]'); if(ddel){deleteDocument(ddel.dataset.docDel);return;}
  const sn=e.target.closest('[data-save-notes]'); if(sn){savePropNotes(sn.dataset.saveNotes);return;}
  const rq=e.target.closest('[data-req-prop]'); if(rq){requestService(rq.dataset.reqProp);return;}
  const ofp=e.target.closest('[data-finding-prop]'); if(ofp){openProperty(ofp.dataset.findingProp,'findings');return;}
  const op=e.target.closest('[data-open-prop]'); if(op){openProperty(op.dataset.openProp);return;}
  const cvr=e.target.closest('[data-schedule-req]'); if(cvr){scheduleFromRequest(state.requests.find(r=>r.id===cvr.dataset.scheduleReq));return;}
  const dcr=e.target.closest('[data-decline-req]'); if(dcr){declineRequest(dcr.dataset.declineReq);return;}
  const oi=e.target.closest('[data-open-insp]'); if(oi){if(!canInspect())return;location.href='inspection.html?inspection='+oi.dataset.openInsp;return;}
  const ri=e.target.closest('[data-report-insp]'); if(ri){location.href='report.html?inspection='+ri.dataset.reportInsp;return;}
  const vi=e.target.closest('[data-view-insp]'); if(vi){e.preventDefault();openFindings(vi.dataset.viewInsp);return;}
  /* estimates */
  if(e.target.closest('[data-act="new-estimate"]')){newEstimate(null);return;}
  const efr=e.target.closest('[data-est-from-req]'); if(efr){const r=state.requests.find(x=>x.id===efr.dataset.estFromReq);newEstimate({org_id:r.org_id,property_id:r.property_id||r.processed_property_id||'',title:(r.property_name||'Assessment')+' — Scope of work',request_id:r.id});return;}
  const eff=e.target.closest('[data-est-from-finding]'); if(eff){const f=(state.currentFindings||[]).find(x=>x.id===eff.dataset.estFromFinding);const i=state.currentInsp;if(f&&i)newEstimate({org_id:i.org_id,property_id:i.property_id||'',inspection_id:i.id,finding_id:f.id,title:(f.category||'Finding')+(f.location?' — '+f.location:''),scope:[f.description,f.action_required].filter(Boolean).join('\n\n')});return;}
  const rief=e.target.closest('[data-req-est-finding]'); if(rief){requestEstimateForFinding(rief.dataset.reqEstFinding);return;}
  if(e.target.closest('[data-scroll-findings]')){const el=document.getElementById('findings-sec');if(el)el.scrollIntoView({behavior:'smooth',block:'start'});return;}
  const efi=e.target.closest('[data-est-from-insp]'); if(efi){const i=state.currentInsp||state.inspections.find(x=>x.id===efi.dataset.estFromInsp);const pn=i?(i.property_name||inspPropName(i)):'';newEstimate({org_id:i&&i.org_id,property_id:i&&i.property_id||'',inspection_id:efi.dataset.estFromInsp,title:pn+' — Scope of work'});return;}
  const oe=e.target.closest('[data-open-est]'); if(oe){openEstimate(oe.dataset.openEst);return;}
  if(e.target.closest('[data-back-est]')){view='estimates';state.currentEstId=null;render();return;}
  const es=e.target.closest('[data-est-send]'); if(es){estSend(es.dataset.estSend);return;}
  const eed=e.target.closest('[data-est-edit]'); if(eed){editEstimate(state.estimates.find(x=>x.id===eed.dataset.estEdit));return;}
  const edel=e.target.closest('[data-est-delete]'); if(edel){estDelete(edel.dataset.estDelete);return;}
  const eap=e.target.closest('[data-est-approve]'); if(eap){estApprove(eap.dataset.estApprove);return;}
  const erv=e.target.closest('[data-est-revise]'); if(erv){estRevise(erv.dataset.estRevise);return;}
  const edc=e.target.closest('[data-est-decline]'); if(edc){estDecline(edc.dataset.estDecline);return;}
  const einv=e.target.closest('[data-est-invoice]'); if(einv){estInvoice(state.estimates.find(x=>x.id===einv.dataset.estInvoice));return;}
  const epd=e.target.closest('[data-est-paid]'); if(epd){estMarkPaid(epd.dataset.estPaid);return;}
  const elk=e.target.closest('[data-est-link]'); if(elk){const url=location.origin+location.pathname.replace(/index\.html$/,'')+'estimate.html?id='+elk.dataset.estLink;navigator.clipboard&&navigator.clipboard.writeText(url).then(()=>toast('Client link copied')).catch(()=>toast(url));return;}
  if(e.target.closest('[data-back]')){view='inspections';render();return;}
  if(e.target.closest('[data-mclose]')){closeModal();return;}
  if(e.target.closest('[data-msave]')){const cb=$('scrim')._save;if(cb)cb(modalValues());return;}
  if(e.target===$('scrim'))closeModal();
});
document.addEventListener('change',e=>{ if(e.target.matches&&e.target.matches('[data-client-select]')){updateModalFilteredProperties();applyGroupToggles();} if(e.target.matches&&e.target.matches('[data-mcontrol]'))applyGroupToggles(); if(e.target.matches&&e.target.matches('[data-pref]'))savePreference(e.target.dataset.pref,e.target.checked); });
let qTimer=null;
$('gsearch').addEventListener('input',e=>{
  clearTimeout(qTimer);
  qTimer=setTimeout(()=>{state.q=e.target.value.trim();if(['properties','inspections','requests','accounts','home','estimates','customers','jobs','account'].includes(view))render();},180);
});

/* ---------- boot ---------- */
sb.auth.onAuthStateChange((_e,session)=>{if(!session)showLogin();});
(async()=>{const {data:{session}}=await sb.auth.getSession();if(session)await loadApp();else showLogin();})();
</script>
</body></html>
