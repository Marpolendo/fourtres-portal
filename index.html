<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FourTres Portal</title>
<meta name="robots" content="noindex"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--navy:#0b0c0c;--orange:#EC6A24;--ink:#1a1c1c;--muted:#5f6368;--paper:#f4f5f3;--line:#d8dad7;--card:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;color:var(--ink);background:var(--paper);min-height:100vh}
  a{color:var(--orange)}
  .hidden{display:none!important}
  .spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px}
  @keyframes s{to{transform:rotate(360deg)}}

  /* ---------- LOGIN ---------- */
  #login-view{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(1200px 500px at 50% -10%, #15171a 0%, #0b0c0c 60%)}
  .card{width:100%;max-width:400px;background:var(--card);border-radius:16px;padding:38px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,.35)}
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:26px}
  .brand img{height:54px;width:auto;margin-bottom:12px}
  .brand h1{font-family:Montserrat;font-weight:800;font-size:22px;color:var(--navy);letter-spacing:.01em}
  .brand p{color:var(--muted);font-size:14px;margin-top:4px}
  label{display:block;font-size:13px;font-weight:600;color:var(--ink);margin:0 0 6px}
  .field{width:100%;border:1px solid var(--line);border-radius:9px;padding:12px 13px;font-size:15px;
    background:#fff;transition:border-color .15s,box-shadow .15s;margin-bottom:16px}
  .field:focus{outline:none;border-color:var(--orange);box-shadow:0 0 0 3px rgba(236,106,36,.16)}
  .btn{width:100%;background:var(--orange);color:#fff;border:0;border-radius:9px;padding:13px;
    font-size:15px;font-weight:600;cursor:pointer;transition:transform .12s,opacity .15s}
  .btn:hover{transform:translateY(-1px)}
  .btn:disabled{opacity:.6;cursor:not-allowed;transform:none}
  .msg{font-size:13.5px;margin-bottom:14px;padding:10px 12px;border-radius:8px;display:none}
  .msg.err{display:block;background:#fdecea;color:#b3261e}
  .foot{text-align:center;font-size:11px;color:#9aa0a6;margin-top:22px;letter-spacing:.12em;text-transform:uppercase}

  /* ---------- APP ---------- */
  .topbar{height:62px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;color:#fff}
  .topbar .l{display:flex;align-items:center;gap:10px}
  .topbar img{height:34px}
  .topbar b{font-family:Montserrat;font-weight:800;font-size:16px;letter-spacing:.02em}
  .topbar .r{display:flex;align-items:center;gap:14px;font-size:14px}
  .badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
    padding:3px 9px;border-radius:999px;background:rgba(255,255,255,.12)}
  .badge.staff{background:var(--orange)}
  .link-btn{background:none;border:1px solid rgba(255,255,255,.3);color:#fff;border-radius:7px;
    padding:7px 13px;font-size:13px;cursor:pointer}
  .link-btn:hover{background:rgba(255,255,255,.1)}
  .wrap{max-width:1000px;margin:0 auto;padding:28px 20px}
  .hello{font-family:Montserrat;font-weight:700;font-size:24px;color:var(--navy);margin-bottom:4px}
  .sub{color:var(--muted);margin-bottom:28px}
  .sec-title{font-family:Montserrat;font-weight:700;font-size:15px;text-transform:uppercase;
    letter-spacing:.06em;color:var(--navy);margin:0 0 14px}
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .tile{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px}
  .tile h3{font-family:Montserrat;font-weight:700;font-size:16px;color:var(--navy);margin-bottom:6px}
  .tile p{color:var(--muted);font-size:14px;line-height:1.5}
  .empty{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:40px 20px;
    text-align:center;color:var(--muted)}
</style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

// ===== CONFIG — paste your values from Supabase → Project Settings → API =====
const SUPABASE_URL      = "https://YOUR-PROJECT.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";
// ============================================================================

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const $ = (id) => document.getElementById(id);
const loginView = $('login-view'), appView = $('app-view');

function showLogin(){ appView.classList.add('hidden'); loginView.classList.remove('hidden'); }
function showApp(){ loginView.classList.add('hidden'); appView.classList.remove('hidden'); }

// ----- login -----
$('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = $('login-btn'), msg = $('login-msg');
  msg.className = 'msg'; msg.textContent = '';
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
  const { error } = await supabase.auth.signInWithPassword({
    email: $('email').value.trim(),
    password: $('password').value,
  });
  btn.disabled = false; btn.textContent = 'Sign in';
  if (error) { msg.className = 'msg err'; msg.textContent = error.message || 'Could not sign in.'; return; }
  await loadApp();
});

// ----- logout -----
$('logout-btn').addEventListener('click', async () => {
  await supabase.auth.signOut();
  showLogin();
});

// ----- load the authenticated view (proves auth + RLS end to end) -----
async function loadApp(){
  const { data:{ user } } = await supabase.auth.getUser();
  if (!user) return showLogin();

  // profile (role + org). RLS lets a user read their own profile.
  const { data: profile } = await supabase
    .from('profiles').select('full_name, role, org_id').eq('id', user.id).single();

  const role = profile?.role || 'client';
  const name = profile?.full_name?.trim() || user.email;
  $('who').textContent = user.email;
  const rb = $('role-badge');
  rb.textContent = role; rb.className = 'badge' + (role === 'staff' ? ' staff' : '');
  $('hello').textContent = 'Welcome, ' + name;
  $('sub').textContent = role === 'staff'
    ? 'You have staff access — you can see every client and property.'
    : 'Here are the properties and reports for your organization.';

  // properties — RLS returns ALL for staff, or only the user's org for clients.
  const { data: props, error } = await supabase
    .from('properties').select('name, city, state, property_type').order('created_at', { ascending:false });

  const box = $('properties');
  if (error) { box.innerHTML = '<div class="empty">Could not load properties.</div>'; }
  else if (!props || props.length === 0) {
    box.innerHTML = '<div class="empty">No properties yet.' +
      (role === 'staff' ? ' Add one once the staff tools are built.' : ' Your assessments will appear here.') + '</div>';
  } else {
    box.innerHTML = '<div class="grid">' + props.map(p =>
      `<div class="tile"><h3>${esc(p.name)}</h3><p>${esc([p.city,p.state].filter(Boolean).join(', '))||'—'}` +
      `${p.property_type ? '<br>'+esc(p.property_type) : ''}</p></div>`).join('') + '</div>';
  }
  showApp();
}

function esc(s){ return String(s==null?'':s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

// keep UI in sync with auth state; check for an existing session on load
supabase.auth.onAuthStateChange((_e, session) => { if (!session) showLogin(); });
(async () => {
  const { data:{ session } } = await supabase.auth.getSession();
  if (session) await loadApp(); else showLogin();
})();
</script>
</body></html>
