<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="color-scheme" content="light"/>
<title>Inspection Report — FourTres</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
  :root{--ink:#1A222C;--muted:#6A7682;--line:#E2E7EC;--line2:#EDF0F3;
    --safety:#1F4E79;--security:#2E7D32;--lighting:#00838F;--traffic:#EF6C00;--compliance:#6A1B9A;--neutral:#1F2933;
    --navy:#101418;--orange:#EC6A24;
    --a-bg:#E8F2E9;--a-t:#2E7D32;--w-bg:#FBEFDD;--w-t:#B45309;--d-bg:#FBE8E8;--d-t:#C62828;--n-bg:#EDF0F3;--n-t:#4D5965;
    color-scheme:light}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Barlow,sans-serif;background:#3A4148;color:var(--ink);-webkit-font-smoothing:antialiased}
  .cond{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.05em}
  .mono{font-family:'JetBrains Mono',monospace}
  .s-safety{--c:var(--safety)}.s-security{--c:var(--security)}.s-lighting{--c:var(--lighting)}
  .s-traffic{--c:var(--traffic)}.s-compliance{--c:var(--compliance)}.s-neutral{--c:var(--neutral)}

  /* toolbar (screen only) */
  .bar{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;display:flex;align-items:center;gap:12px;padding:10px 16px}
  .bar .t{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.06em;font-size:15px}
  .bar .sp{flex:1}
  .bar .hint{font-size:11.5px;opacity:.65}
  .bbtn{border:0;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer;padding:9px 15px;font-family:Barlow,sans-serif}
  .bbtn.ghost{background:rgba(255,255,255,.12);color:#fff}
  .bbtn.primary{background:var(--orange);color:#fff}
  .bbtn:disabled{opacity:.5;cursor:default}

  .deck{display:flex;flex-direction:column;align-items:center;gap:18px;padding:18px 10px 60px}
  .sheet{width:1280px;height:720px;background:#EEF1F4;box-shadow:0 10px 40px rgba(0,0,0,.35);position:relative;overflow:hidden;flex:none;transform-origin:top center}
  .pad{padding:34px 44px 54px;height:100%;display:flex;flex-direction:column}
  .pfoot{position:absolute;left:44px;right:44px;bottom:16px;display:flex;justify-content:space-between;align-items:center;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.06em;text-transform:uppercase;color:#8B96A1}
  .pfoot .brand{display:flex;align-items:center;gap:7px}
  .pfoot img{height:15px}

  /* cover */
  .cover{background:linear-gradient(135deg,#101418 0%,#1B2430 100%);color:#fff}
  .cover .pad{padding:48px 56px}
  .cov-top{display:flex;align-items:center;gap:14px}
  .cov-top img{height:46px}
  .cov-top .wn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:22px;letter-spacing:.06em}
  .cov-top .wn em{color:var(--orange);font-style:normal}
  .cov-mid{margin-top:52px}
  .cov-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--orange)}
  .cov-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.02em;font-size:56px;line-height:1.02;margin-top:12px}
  .cov-sub{font-size:16px;opacity:.75;margin-top:12px}
  .cov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:auto}
  .cov-cell{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:12px 14px}
  .cov-cell .k{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;opacity:.55}
  .cov-cell .v{font-weight:600;font-size:14px;margin-top:5px;min-height:17px}
  .cov-score{display:flex;gap:12px;margin-top:20px}
  .cs{border-radius:10px;padding:11px 18px;text-align:center;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12)}
  .cs .n{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:26px;line-height:1}
  .cs .k{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.12em;text-transform:uppercase;opacity:.6;margin-top:4px}
  .cs.hero{background:var(--orange);border-color:var(--orange)}

  /* domain pages */
  .headbar{display:flex;align-items:center;gap:16px;background:var(--c);border-radius:10px;padding:13px 20px;color:#fff;margin-bottom:14px;flex:none}
  .headbar .tick{width:7px;height:28px;background:rgba(255,255,255,.5);border-radius:4px}
  .headbar h2{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em;font-size:21px;line-height:1}
  .headbar p{font-size:11.5px;opacity:.85;margin-top:2px}
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-content:start}
  .card{background:#fff;border:1px solid var(--line);border-top:3px solid var(--c);border-radius:9px;padding:10px 14px;break-inside:avoid}
  .ctitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--c);font-size:12.5px;margin-bottom:6px;display:flex;align-items:center;gap:7px}
  .ctitle::before{content:'';width:6px;height:6px;background:var(--c);border-radius:2px}
  .item{display:flex;align-items:center;gap:9px;padding:3.5px 0;border-bottom:1px solid var(--line2)}
  .item:last-child{border-bottom:0}
  .itxt{flex:1;font-size:11.5px;font-weight:500;color:#2C3744;line-height:1.25}
  .rchip{flex:none;min-width:26px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:0 6px}
  .rchip.mono{font-size:8.5px}
  .r-a{background:var(--a-bg);color:var(--a-t)}.r-w{background:var(--w-bg);color:var(--w-t)}
  .r-d{background:var(--d-bg);color:var(--d-t)}.r-n{background:var(--n-bg);color:var(--n-t)}
  .r-blank{background:#F4F6F8;color:#B7C0C9}
  .obsbox{background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 14px;margin-top:12px}
  .obsl{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-size:10.5px;color:var(--c);margin-bottom:4px}
  .obst{font-size:11.5px;line-height:1.45;color:#3A4450;white-space:pre-wrap}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:14px;flex:1;min-height:0}

  /* closeout */
  .dtable{width:100%;border-collapse:separate;border-spacing:0;background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .dtable th{font-family:'JetBrains Mono',monospace;font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#8B96A1;text-align:left;padding:7px 9px;background:#F7F9FA;border-bottom:1px solid var(--line)}
  .dtable td{font-size:10.5px;padding:6px 9px;border-bottom:1px solid var(--line2);vertical-align:top;line-height:1.3}
  .dtable tr:last-child td{border-bottom:0}
  .sev{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;white-space:nowrap}
  .sev.low{background:var(--n-bg);color:var(--n-t)}.sev.medium{background:var(--w-bg);color:var(--w-t)}.sev.high{background:var(--d-bg);color:var(--d-t)}
  .fst{font-size:9px;font-weight:700;padding:2px 7px;border-radius:999px;white-space:nowrap}
  .fst.open{background:var(--d-bg);color:var(--d-t)}.fst.in_progress{background:var(--w-bg);color:var(--w-t)}.fst.resolved{background:var(--a-bg);color:var(--a-t)}
  .co-grid{display:grid;grid-template-columns:1.35fr 1fr;gap:14px;flex:1;min-height:0}
  .cochecks{display:grid;grid-template-columns:1fr;gap:7px;align-content:start}
  .cbox{display:flex;align-items:center;gap:9px;font-size:11.5px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 11px}
  .box{width:16px;height:16px;border:1.5px solid #B7C0C9;border-radius:4px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;font-weight:700}
  .box.on{background:var(--security);border-color:var(--security)}
  .box.on::after{content:'✓'}
  .sig{background:#fff;border:1px solid var(--line);border-radius:9px;padding:12px 14px;margin-top:10px}
  .sig .k{font-family:'JetBrains Mono',monospace;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:#8B96A1}
  .sig .v{font-weight:600;font-size:13px;border-bottom:1px solid var(--line);padding:5px 0 4px;min-height:24px}
  .comm{font-size:11px;line-height:1.45;color:#3A4450;white-space:pre-wrap}

  /* photos */
  .phgrid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:12px;flex:1;min-height:0}
  .phcard{background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden;display:flex;flex-direction:column}
  .phcard img{width:100%;height:70%;object-fit:cover;display:block;background:#DDE3E8}
  .phcard .pm{padding:7px 10px;flex:1}
  .phcard .pa{font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:11px;color:#2C3744}
  .phcard .pd{font-size:9.5px;color:var(--muted);margin-top:2px;line-height:1.3}
  .phcard .pn{font-family:'JetBrains Mono',monospace;font-size:8px;color:#AEB7C0}

  .loading{color:#fff;text-align:center;padding:80px 20px;font-size:15px}

  /* screen scaling for small windows */
  @media(max-width:1330px){.deck{transform-origin:top center}.sheet{transform:scale(calc((100vw - 24px)/1280));margin-bottom:calc(720px*(((100vw - 24px)/1280) - 1))}}

  @media print{
    body{background:#fff}
    .bar{display:none!important}
    .deck{padding:0;gap:0;display:block}
    .sheet{box-shadow:none;transform:none!important;margin:0!important;page-break-after:always;break-after:page}
    .sheet:last-child{page-break-after:auto}
  }
  @page{size:13.333in 7.5in;margin:0}
</style>
</head>

  ]}
};
const SITE_FIELDS=[['client_name','Client'],['property_name','Property'],['address','Address'],['inspection_date','Inspection date'],['technician','Technician'],['site_contact','Site contact'],['weather','Weather'],['time_of_inspection','Time of inspection']];
const CLOSEOUT_CHECKS=[['photos_taken','Required photos taken'],['deficiencies_documented','Deficiencies documented'],['concerns_captured','Client concerns captured'],['docs_complete','Documentation complete']];
const RCHIP={a:['✓','r-a',''],w:['⚠','r-w',''],d:['✖','r-d',''],n:['N/A','r-n','mono']};

let insp=null,findings=[],photos=[];
(async function(){
  const id=new URLSearchParams(location.search).get('inspection');
  if(!id){$hint('No inspection specified.');return;}
  const {data,error}=await sb.from('inspections').select('*').eq('id',id).single();
  if(error||!data){$hint('Could not load this report — sign in on the portal first.');document.getElementById('deck').innerHTML='<div class="loading">Report unavailable. Make sure you are signed in to the portal, then reopen this report.</div>';return;}
  insp=data;insp.ratings=insp.ratings||{};insp.observations=insp.observations||{};insp.closeout=insp.closeout||{};
  const [{data:f},{data:p}]=await Promise.all([
    sb.from('inspection_findings').select('*').eq('inspection_id',id).order('find_no'),
    sb.from('inspection_photos').select('*').eq('inspection_id',id).order('photo_no')
  ]);
  findings=f||[];photos=(p||[]);
  for(const ph of photos){try{const {data:s}=await sb.storage.from('inspection-photos').createSignedUrl(ph.storage_path,3600);ph.url=s?.signedUrl;}catch(e){}}
  build();
  await waitForImages();
  $hint((document.querySelectorAll('.sheet').length)+' pages · Use “Download PDF”, then choose “Save as PDF”.');
  const b=document.getElementById('pdf-btn');b.disabled=false;b.onclick=()=>window.print();
})();
function $hint(t){document.getElementById('hint').textContent=t;}
async function waitForImages(){
  const imgs=[...document.querySelectorAll('.deck img')];
  await Promise.all(imgs.map(im=>im.complete?Promise.resolve():new Promise(r=>{im.onload=r;im.onerror=r;})));
}

function build(){
  const sheets=[];
  sheets.push(coverSheet());
  sheets.push(domainSheet('Safety Inspection',['safety']));
  sheets.push(domainSheet('Security & Lighting',['security','lighting']));
  sheets.push(domainSheet('Traffic & Compliance',['traffic','compliance']));
  sheets.push(closeoutSheet());
  const withUrl=photos.filter(p=>p.url);
  for(let i=0;i<withUrl.length;i+=8)sheets.push(photoSheet(withUrl.slice(i,i+8),i));
  document.getElementById('deck').innerHTML=sheets.join('');
  numberFooters();
}
function foot(label){
  return `<div class="pfoot"><span class="brand"><img src="${SHIELD}" alt=""/> FourTres · A SIETE company</span><span>${esc(insp.property_name||'')} · ${esc(insp.inspection_date||'')}</span><span class="pgn"></span></div>`;
}
function numberFooters(){const sheets=[...document.querySelectorAll('.sheet')];sheets.forEach((s,i)=>{const n=s.querySelector('.pgn');if(n)n.textContent='Page '+(i+1)+' / '+sheets.length;});}
function scoreStats(){
  const r=insp.ratings;const vals=Object.values(r).filter(Boolean);
  const c=t=>vals.filter(x=>x===t).length;
  const nonNA=vals.filter(v=>v!=='n');
  const score=nonNA.length?Math.round(nonNA.reduce((s,v)=>s+(v==='a'?1:v==='w'?0.5:0),0)/nonNA.length*100):null;
  return {a:c('a'),w:c('w'),d:c('d'),n:c('n'),score};
}
function coverSheet(){
  const s=scoreStats();
  return `<div class="sheet cover"><div class="pad">
    <div class="cov-top"><img src="${SHIELD}" alt="FourTres"/><span class="wn cond">FOUR<em>TRES</em></span></div>
    <div class="cov-mid">
      <div class="cov-eyebrow">Field Inspection Report</div>
      <div class="cov-title">${esc(insp.property_name||'Property Assessment')}</div>
      <div class="cov-sub">${esc([insp.client_name,insp.address].filter(Boolean).join(' · '))}</div>
      <div class="cov-score">
        ${s.score!=null?`<div class="cs hero"><div class="n">${s.score}%</div><div class="k">Site score</div></div>`:''}
        <div class="cs"><div class="n">${s.a}</div><div class="k">Acceptable</div></div>
        <div class="cs"><div class="n">${s.w}</div><div class="k">Needs attention</div></div>
        <div class="cs"><div class="n">${s.d}</div><div class="k">Deficiencies</div></div>
        <div class="cs"><div class="n">${findings.length}</div><div class="k">Findings</div></div>
      </div>
    </div>
    <div class="cov-grid">${SITE_FIELDS.map(([k,l])=>`<div class="cov-cell"><div class="k">${l}</div><div class="v">${esc(insp[k]||'—')}</div></div>`).join('')}</div>
  </div>${foot()}</div>`;
}
function domainSheet(title,doms){
  const first=DOMAINS[doms[0]];
  const inner=doms.map(dk=>{
    const d=DOMAINS[dk];
    return `<div class="${d.theme}" style="display:flex;flex-direction:column;min-height:0">
      <div class="headbar"><div class="tick"></div><div><h2>${d.name}</h2><p>${d.blurb}</p></div></div>
      <div class="cols" style="grid-template-columns:1fr">${d.groups.map(g=>`<div class="card"><div class="ctitle">${g.name}</div>
        ${g.items.map(([k,l])=>{const r=insp.ratings[k];const ch=RCHIP[r];return `<div class="item"><span class="itxt">${l}</span><span class="rchip ${ch?ch[1]:'r-blank'} ${ch?ch[2]:''}">${ch?ch[0]:'—'}</span></div>`;}).join('')}</div>`).join('')}
      </div>
      ${insp.observations[dk]&&String(insp.observations[dk]).trim()?`<div class="obsbox"><div class="obsl">${d.name} — Observations</div><div class="obst">${esc(insp.observations[dk])}</div></div>`:''}
    </div>`;
  }).join('');
  if(doms.length===2)return `<div class="sheet"><div class="pad"><div class="twocol">${inner}</div></div>${foot()}</div>`;
  /* single domain: split its groups into two columns */
  const dk=doms[0], d=first;
  return `<div class="sheet"><div class="pad ${d.theme}">
    <div class="headbar"><div class="tick"></div><div><h2>${title}</h2><p>${d.blurb}</p></div></div>
    <div class="cols">${d.groups.map(g=>`<div class="card"><div class="ctitle">${g.name}</div>
      ${g.items.map(([k,l])=>{const r=insp.ratings[k];const ch=RCHIP[r];return `<div class="item"><span class="itxt">${l}</span><span class="rchip ${ch?ch[1]:'r-blank'} ${ch?ch[2]:''}">${ch?ch[0]:'—'}</span></div>`;}).join('')}</div>`).join('')}</div>
    ${insp.observations[dk]&&String(insp.observations[dk]).trim()?`<div class="obsbox"><div class="obsl">${d.name} — Observations</div><div class="obst">${esc(insp.observations[dk])}</div></div>`:''}
  </div>${foot()}</div>`;
}
function closeoutSheet(){
  const rows=findings.map(f=>`<tr>
    <td class="mono">#${f.find_no||''}</td><td>${esc(f.category||'—')}</td>
    <td>${f.severity?`<span class="sev ${f.severity}">${{low:'Low',medium:'Medium',high:'High'}[f.severity]}</span>`:'—'}</td>
    <td>${f.status?`<span class="fst ${f.status}">${{open:'Open',in_progress:'In progress',resolved:'Resolved'}[f.status]||esc(f.status)}</span>`:'—'}</td>
    <td>${esc(f.location||'—')}</td><td>${esc(f.description||'—')}</td><td>${esc(f.action_required||'—')}</td>
    <td>${esc(f.responsible_party||'—')}</td><td class="mono">${esc(f.due_date||'—')}</td></tr>`).join('');
  return `<div class="sheet"><div class="pad s-neutral">
    <div class="headbar"><div class="tick"></div><div><h2>Site Closeout</h2><p>Deficiency log · verification · sign-off</p></div></div>
    <div class="co-grid">
      <div style="min-height:0;display:flex;flex-direction:column">
        <table class="dtable"><thead><tr><th>No</th><th>Category</th><th>Sev</th><th>Status</th><th>Location</th><th>Description</th><th>Action required</th><th>Responsible</th><th>Due</th></tr></thead>
        <tbody>${rows||'<tr><td colspan="9" style="text-align:center;color:#8B96A1;padding:14px">No deficiencies recorded — no issues found during this inspection.</td></tr>'}</tbody></table>
        ${insp.technician_comments?`<div class="obsbox" style="margin-top:10px"><div class="obsl" style="color:var(--neutral)">Technician comments</div><div class="comm">${esc(insp.technician_comments)}</div></div>`:''}
      </div>
      <div style="min-height:0;display:flex;flex-direction:column">
        <div class="cochecks">${CLOSEOUT_CHECKS.map(([k,l])=>`<div class="cbox"><span class="box ${insp.closeout[k]?'on':''}"></span>${l}</div>`).join('')}</div>
        <div class="sig"><div class="k">Technician</div><div class="v">${esc(insp.technician_name||'')}</div>
          <div style="height:9px"></div><div class="k">Date</div><div class="v mono">${esc(insp.signed_date||insp.inspection_date||'')}</div></div>
      </div>
    </div>
  </div>${foot()}</div>`;
}
function photoSheet(chunk,offset){
  return `<div class="sheet"><div class="pad s-lighting">
    <div class="headbar"><div class="tick"></div><div><h2>Photo Documentation</h2><p>Site photos ${offset+1}–${offset+chunk.length} of ${photos.filter(p=>p.url).length}</p></div></div>
    <div class="phgrid">${chunk.map((p,i)=>`<div class="phcard"><img src="${p.url}" crossorigin="anonymous" alt=""/>
      <div class="pm"><div class="pa">${esc(p.area||'Photo '+(offset+i+1))}</div><div class="pd">${esc(p.description||'')}</div><div class="pn">P-${String(offset+i+1).padStart(2,'0')}</div></div></div>`).join('')}</div>
  </div>${foot()}</div>`;
}
</script>
</body></html>
